<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Змейка — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; touch-action: manipulation; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .ctrl { width: 55px; height: 55px; border-radius: 14px; background: var(--card); color: var(--text); border: 2px solid var(--accent); font-size: 24px; cursor: pointer; font-weight: bold; touch-action: manipulation; }
        .ctrl:active { background: var(--accent); }
        .record { font-size: 14px; color: #f0c040; margin-top: 5px; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="main.html" class="back">← Назад</a>
        <h2>🐍 Змейка</h2>
        <div class="score">Очки: <span id="snakeScore">0</span></div>
        <div class="record">🏆 Рекорд: <span id="snakeRecord">0</span></div>
        <canvas id="snakeCanvas" width="300" height="300"></canvas>
        <div class="controls">
            <button class="ctrl" id="snakeUp">↑</button>
            <button class="ctrl" id="snakeDown">↓</button>
            <button class="ctrl" id="snakeLeft">←</button>
            <button class="ctrl" id="snakeRight">→</button>
        </div>
        <button class="btn" id="snakeRestart">🔄 Новая игра</button>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script src="modals.js"></script>
    <script>
        SFX.playMusic('subway');
        const canvas = document.getElementById('snakeCanvas'), ctx = canvas.getContext('2d');
        const GRID = 15, CELL = 20;
        let snake = [], food = {}, dir = 'right', nextDir = 'right', score = 0, interval = null, running = false;
        document.getElementById('snakeRecord').textContent = Highscores.get('snake');

        function start() {
            snake = [{x:7,y:7},{x:6,y:7},{x:5,y:7}];
            dir = 'right'; nextDir = 'right'; score = 0; running = true;
            document.getElementById('snakeScore').textContent = '0';
            placeFood();
            if (interval) clearInterval(interval);
            interval = setInterval(update, 100);
            draw();
        }

        function placeFood() {
            do { food = {x:Math.floor(Math.random()*GRID), y:Math.floor(Math.random()*GRID)}; }
            while (snake.some(s=>s.x===food.x&&s.y===food.y));
        }

        function update() {
            if (!running) return;
            dir = nextDir;
            const head = snake[0];
            let nx = head.x, ny = head.y;
            if (dir==='up') ny--; if (dir==='down') ny++; if (dir==='left') nx--; if (dir==='right') nx++;
            if (nx<0||nx>=GRID||ny<0||ny>=GRID||snake.some(s=>s.x===nx&&s.y===ny)) {
                clearInterval(interval); running = false;
                const isNew = Highscores.save('snake', score);
                document.getElementById('snakeRecord').textContent = Highscores.get('snake');
                Modal.show('💀 Конец игры', `Очки: ${score}${isNew?'\n🏆 Новый рекорд!':''}`).then(() => start());
                return;
            }
            snake.unshift({x:nx,y:ny});
            if (nx===food.x&&ny===food.y) { score+=10; document.getElementById('snakeScore').textContent=score; SFX.eat(); placeFood(); }
            else snake.pop();
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#e94560'; ctx.fillRect(food.x*CELL, food.y*CELL, CELL, CELL);
            snake.forEach((s,i) => { ctx.fillStyle = i===0 ? '#4caf84' : '#4a90d9'; ctx.fillRect(s.x*CELL, s.y*CELL, CELL, CELL); });
        }

        document.getElementById('snakeUp').addEventListener('click', ()=>{ if (dir!=='down') nextDir='up'; });
        document.getElementById('snakeDown').addEventListener('click', ()=>{ if (dir!=='up') nextDir='down'; });
        document.getElementById('snakeLeft').addEventListener('click', ()=>{ if (dir!=='right') nextDir='left'; });
        document.getElementById('snakeRight').addEventListener('click', ()=>{ if (dir!=='left') nextDir='right'; });
        document.getElementById('snakeRestart').addEventListener('click', start);
        start();
    </script>
</body>
</html>
