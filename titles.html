<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Титулы — BatonCHIK Games</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; --text-secondary: #b0b0b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 16px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 20px; }
        .title-card {
            background: var(--card); border-radius: 14px; padding: 16px; margin: 10px 0;
            display: flex; align-items: center; gap: 12px; text-align: left;
        }
        .title-card.locked { opacity: 0.4; }
        .title-icon { font-size: 32px; }
        .title-info { flex: 1; }
        .title-name { font-size: 16px; font-weight: bold; }
        .title-desc { font-size: 12px; color: var(--text-secondary); }
        .title-status { font-size: 12px; color: #f0c040; }
    </style>
</head>
<body>
    <div class="container">
        <a href="main.html" class="back">← Назад</a>
        <h2>🏆 Титулы</h2>
        <div id="titlesList"></div>
    </div>
    <script>
        const titles = [
            { id: 'app-installer', name: 'Истинный Геймер', desc: 'Титул за установку приложения', icon: '📲' }
        ];
        
        const list = document.getElementById('titlesList');
        titles.forEach(t => {
            const unlocked = localStorage.getItem('title-' + t.id) === '1';
            list.innerHTML += `
                <div class="title-card ${unlocked ? '' : 'locked'}">
                    <div class="title-icon">${t.icon}</div>
                    <div class="title-info">
                        <div class="title-name">${t.name}</div>
                        <div class="title-desc">${t.desc}</div>
                    </div>
                    <div class="title-status">${unlocked ? '✅' : '🔒'}</div>
                </div>
            `;
        });
    </script>
</body>
</html>
