<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper.io — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; --text-secondary: #b0b0b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score-board { display: flex; justify-content: center; gap: 40px; margin: 10px 0; font-size: 16px; }
        .score-board span { color: #f0c040; font-weight: bold; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
        .joysticks { display: flex; justify-content: space-around; margin-top: 10px; }
        .joy-container { display: flex; flex-direction: column; align-items: center; }
        .joy-base { width: 80px; height: 80px; border-radius: 50%; background: var(--card); border: 2px solid var(--accent); position: relative; touch-action: none; }
        .joy-stick { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: 0.05s; }
        .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="main.html" class="back">← Назад</a>
        <h2>🗺️ Paper.io</h2>
        <div class="score-board">
            <span>🔴 <span id="score1">10</span>%</span>
            <span>🔵 <span id="score2">10</span>%</span>
        </div>
        <canvas id="canvas" width="300" height="300"></canvas>
        <div class="joysticks">
            <div class="joy-container">
                <div class="label">Игрок 1 🔴</div>
                <div class="joy-base" id="joy1">
                    <div class="joy-stick" id="stick1"></div>
                </div>
            </div>
            <div class="joy-container">
                <div class="label">Игрок 2 🔵</div>
                <div class="joy-base" id="joy2">
                    <div class="joy-stick" id="stick2"></div>
                </div>
            </div>
        </div>
        <button class="btn" id="newGame">🔄 Новая игра</button>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script src="modals.js"></script>
    <script>
        SFX.playMusic('action');
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const SIZE = 300, CELL = 5, GRID = SIZE/CELL;
        let grid = [];
        let p1 = { x:15, y:15, dir:'right', alive:true, trail:[] };
        let p2 = { x:45, y:45, dir:'left', alive:true, trail:[] };
        let dir1 = 'right', dir2 = 'left';

        function start() {
            grid = Array(GRID).fill().map(() => Array(GRID).fill(0));
            for (let r=10; r<20; r++) for (let c=10; c<20; c++) grid[r][c] = 1;
            for (let r=40; r<50; r++) for (let c=40; c<50; c++) grid[r][c] = 2;
            p1 = { x:15, y:15, dir:'right', alive:true, trail:[] };
            p2 = { x:45, y:45, dir:'left', alive:true, trail:[] };
            dir1 = 'right'; dir2 = 'left';
            updateScores();
            draw();
        }

        function movePlayer(p, dir, id) {
            if (!p.alive) return;
            const trailId = id === 1 ? 3 : 4;
            const colorId = id;
            p.dir = dir;
            let nx = p.x, ny = p.y;
            if (dir === 'up') ny--; if (dir === 'down') ny++; if (dir === 'left') nx--; if (dir === 'right') nx++;
            if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) { p.alive = false; return; }
            
            // Врезался в чужой след или территорию → проигрыш
            if (grid[ny][nx] === (id === 1 ? 2 : 1) || grid[ny][nx] === (id === 1 ? 4 : 3)) { p.alive = false; return; }
            // Врезался в свой след → проигрыш
            if (grid[ny][nx] === trailId) { p.alive = false; return; }
            
            if (grid[ny][nx] === 0) {
                p.trail.push({x:nx, y:ny});
                grid[ny][nx] = trailId;
            }
            else if (grid[ny][nx] === colorId && p.trail.length > 0) {
                // Закрашиваем всю внутреннюю территорию
                floodFill(p.trail, colorId);
                p.trail = [];
            }
            
            p.x = nx; p.y = ny;
        }

        function floodFill(trail, colorId) {
            // Создаём временную маску
            const mask = Array(GRID).fill().map(() => Array(GRID).fill(false));
            // Отмечаем границу (trail как стены)
            trail.forEach(t => mask[t.y][t.x] = true);
            // Отмечаем территорию игрока как недоступную для заливки
            for (let r=0; r<GRID; r++) for (let c=0; c<GRID; c++) if (grid[r][c] === colorId) mask[r][c] = true;
            
            // Находим точку внутри (например, рядом с игроком)
            const start = findInside(trail, colorId);
            if (!start) return;
            
            // BFS заливка
            const queue = [start];
            const filled = [];
            while (queue.length > 0) {
                const {x, y} = queue.shift();
                if (x<0||x>=GRID||y<0||y>=GRID||mask[y][x]) continue;
                mask[y][x] = true;
                filled.push({x, y});
                queue.push({x:x+1, y}, {x:x-1, y}, {x, y:y+1}, {x, y:y-1});
            }
            
            // Закрашиваем
            filled.forEach(({x, y}) => grid[y][x] = colorId);
            trail.forEach(t => grid[t.y][t.x] = colorId);
        }

        function findInside(trail, colorId) {
            // Ищем клетку, соседнюю с trail, которая не является trail и не занята
            for (const t of trail) {
                const neighbors = [{x:t.x+1,y:t.y},{x:t.x-1,y:t.y},{x:t.x,y:t.y+1},{x:t.x,y:t.y-1}];
                for (const n of neighbors) {
                    if (n.x>=0&&n.x<GRID&&n.y>=0&&n.y<GRID && grid[n.y][n.x]===0) return n;
                }
            }
            return null;
        }

        function update() {
            if (p1.alive) movePlayer(p1, dir1, 1);
            if (p2.alive) movePlayer(p2, dir2, 2);
            
            if (!p1.alive || !p2.alive) {
                const winner = !p1.alive ? '🔵 Игрок 2' : '🔴 Игрок 1';
                setTimeout(() => Modal.show('Игра окончена', `${winner} победил!`).then(() => start()), 300);
                return;
            }
            
            updateScores();
            draw();
        }

        function updateScores() {
            document.getElementById('score1').textContent = countTerritory(1);
            document.getElementById('score2').textContent = countTerritory(2);
        }

        function countTerritory(id) {
            let count = 0;
            for (let r=0; r<GRID; r++) for (let c=0; c<GRID; c++) if (grid[r][c] === id) count++;
            return Math.round(count/(GRID*GRID)*100);
        }

        function draw() {
            ctx.clearRect(0,0,SIZE,SIZE);
            for (let r=0; r<GRID; r++) for (let c=0; c<GRID; c++) {
                if (grid[r][c] === 1) { ctx.fillStyle = '#e94560'; ctx.fillRect(c*CELL, r*CELL, CELL, CELL); }
                else if (grid[r][c] === 2) { ctx.fillStyle = '#4a90d9'; ctx.fillRect(c*CELL, r*CELL, CELL, CELL); }
                else if (grid[r][c] === 3) { ctx.fillStyle = '#ffaaaa'; ctx.fillRect(c*CELL, r*CELL, CELL, CELL); }
                else if (grid[r][c] === 4) { ctx.fillStyle = '#aaaaff'; ctx.fillRect(c*CELL, r*CELL, CELL, CELL); }
            }
            if (p1.alive) { ctx.fillStyle = '#fff'; ctx.fillRect(p1.x*CELL, p1.y*CELL, CELL, CELL); }
            if (p2.alive) { ctx.fillStyle = '#fff'; ctx.fillRect(p2.x*CELL, p2.y*CELL, CELL, CELL); }
        }

        // Круглые джойстики
        function setupJoystick(baseId, stickId, setDir) {
            const base = document.getElementById(baseId);
            const stick = document.getElementById(stickId);
            let active = false;
            
            base.addEventListener('pointerdown', (e) => {
                active = true;
                base.setPointerCapture(e.pointerId);
                moveStick(e);
            });
            base.addEventListener('pointermove', (e) => {
                if (!active) return;
                moveStick(e);
            });
            base.addEventListener('pointerup', () => {
                active = false;
                stick.style.transform = 'translate(-50%, -50%)';
                setDir(null);
            });
            
            function moveStick(e) {
                const rect = base.getBoundingClientRect();
                const cx = rect.left + rect.width/2;
                const cy = rect.top + rect.height/2;
                const dx = e.clientX - cx;
                const dy = e.clientY - cy;
                const dist = Math.sqrt(dx*dx+dy*dy);
                const maxDist = 22;
                
                let mx = dx, my = dy;
                if (dist > maxDist) { mx = dx/dist*maxDist; my = dy/dist*maxDist; }
                
                stick.style.transform = `translate(calc(-50% + ${mx}px), calc(-50% + ${my}px))`;
                
                if (dist > 10) {
                    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 'right' : 'left');
                    else setDir(dy > 0 ? 'down' : 'up');
                }
            }
        }

        setupJoystick('joy1', 'stick1', (d) => { if (d) dir1 = d; });
        setupJoystick('joy2', 'stick2', (d) => { if (d) dir2 = d; });

        // Клавиатура
        document.addEventListener('keydown', (e) => {
            if (e.key === 'w') dir1 = 'up';
            if (e.key === 's') dir1 = 'down';
            if (e.key === 'a') dir1 = 'left';
            if (e.key === 'd') dir1 = 'right';
            if (e.key === 'ArrowUp') dir2 = 'up';
            if (e.key === 'ArrowDown') dir2 = 'down';
            if (e.key === 'ArrowLeft') dir2 = 'left';
            if (e.key === 'ArrowRight') dir2 = 'right';
        });

        setInterval(update, 120);
        document.getElementById('newGame').addEventListener('click', start);
        start();
    </script>
</body>
</html>
