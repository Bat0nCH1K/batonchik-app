<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper.io — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; --text-secondary: #b0b0b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score-board { display: flex; justify-content: center; gap: 40px; margin: 10px 0; font-size: 16px; }
        .score-board span { color: #f0c040; font-weight: bold; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
        .joysticks { display: flex; justify-content: space-around; margin-top: 10px; }
        .joy-container { display: flex; flex-direction: column; align-items: center; }
        .joy-base { width: 80px; height: 80px; border-radius: 50%; background: var(--card); border: 2px solid var(--accent); position: relative; touch-action: none; }
        .joy-stick { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: 0.05s; }
        .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="main.html" class="back">← Назад</a>
        <h2>🗺️ Paper.io</h2>
        <div class="score-board">
            <span>🔴 <span id="score1">10</span>%</span>
            <span>🔵 <span id="score2">10</span>%</span>
        </div>
        <canvas id="canvas" width="300" height="300"></canvas>
        <div class="joysticks">
            <div class="joy-container">
                <div class="label">Игрок 1 🔴</div>
                <div class="joy-base" id="joy1">
                    <div class="joy-stick" id="stick1"></div>
                </div>
            </div>
            <div class="joy-container">
                <div class="label">Игрок 2 🔵</div>
                <div class="joy-base" id="joy2">
                    <div class="joy-stick" id="stick2"></div>
                </div>
            </div>
        </div>
        <button class="btn" id="newGame">🔄 Новая игра</button>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script src="modals.js"></script>
    <script>
        SFX.playMusic('action');
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const SIZE = 300, CELL = 5, GRID = SIZE / CELL;
        let grid = [];
        // 0 = пусто, 1 = территория P1, 2 = территория P2
        // 3 = след P1 (хвост), 4 = след P2 (хвост)
        let p1 = { x: 15, y: 15, dir: 'right', alive: true, trail: [] };
        let p2 = { x: 45, y: 45, dir: 'left', alive: true, trail: [] };
        let dir1 = 'right', dir2 = 'left';
        let gameRunning = true;

        const OPPOSITE = { 'up': 'down', 'down': 'up', 'left': 'right', 'right': 'left' };

        function start() {
            grid = Array(GRID).fill().map(() => Array(GRID).fill(0));
            for (let r = 8; r < 18; r++) for (let c = 8; c < 18; c++) grid[r][c] = 1;
            for (let r = 42; r < 52; r++) for (let c = 42; c < 52; c++) grid[r][c] = 2;
            p1 = { x: 13, y: 13, dir: 'right', alive: true, trail: [] };
            p2 = { x: 47, y: 47, dir: 'left', alive: true, trail: [] };
            dir1 = 'right'; dir2 = 'left';
            gameRunning = true;
            updateScores();
            draw();
        }

        function movePlayer(p, dir, id) {
            if (!p.alive || !gameRunning) return;
            
            const trailId = id === 1 ? 3 : 4;
            const colorId = id;
            const enemyId = id === 1 ? 2 : 1;
            const enemyTrailId = id === 1 ? 4 : 3;
            
            // Игнорируем разворот на 180° (самоподрез)
            if (dir === OPPOSITE[p.dir]) {
                dir = p.dir; // Оставляем текущее направление
            }
            
            p.dir = dir;
            let nx = p.x, ny = p.y;
            if (dir === 'up') ny--;
            if (dir === 'down') ny++;
            if (dir === 'left') nx--;
            if (dir === 'right') nx++;
            
            // Вышел за границу
            if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) {
                p.alive = false;
                return;
            }
            
            const cell = grid[ny][nx];
            
            // Врезался в чужую территорию или след — умирает тот, кто врезался
            if (cell === enemyId || cell === enemyTrailId) {
                p.alive = false;
                return;
            }
            
            // Врезался в свой след — самоподрез (умирает)
            if (cell === trailId) {
                p.alive = false;
                return;
            }
            
            // Наступил на пустую клетку — оставляем след
            if (cell === 0) {
                p.trail.push({ x: nx, y: ny });
                grid[ny][nx] = trailId;
            }
            // Наступил на свою территорию — замыкаем
            else if (cell === colorId) {
                if (p.trail.length > 0) {
                    captureTerritory(p.trail, colorId, trailId);
                    p.trail = [];
                }
            }
            
            p.x = nx;
            p.y = ny;
        }

        function captureTerritory(trail, colorId, trailId) {
            if (trail.length < 4) {
                trail.forEach(t => { if (grid[t.y][t.x] === trailId) grid[t.y][t.x] = 0; });
                return;
            }
            
            // Создаём Set для быстрой проверки trail
            const trailSet = new Set(trail.map(t => `${t.x},${t.y}`));
            
            // Ищем стартовую точку для заливки — соседняя с trail с внутренней стороны
            let start = null;
            
            // Вычисляем нормаль (перпендикуляр к направлению замыкания)
            // Берём среднюю точку trail и смотрим по всем направлениям
            const mid = trail[Math.floor(trail.length / 2)];
            const neighbors = [
                { x: mid.x + 1, y: mid.y },
                { x: mid.x - 1, y: mid.y },
                { x: mid.x, y: mid.y + 1 },
                { x: mid.x, y: mid.y - 1 }
            ];
            
            for (const n of neighbors) {
                if (n.x >= 0 && n.x < GRID && n.y >= 0 && n.y < GRID) {
                    if (grid[n.y][n.x] === 0 && !trailSet.has(`${n.x},${n.y}`)) {
                        start = n;
                        break;
                    }
                }
            }
            
            if (!start) {
                // Не нашли внутреннюю точку — ищем любую пустую внутри
                // Строим bounding box trail и ищем внутри
                let minX = GRID, maxX = 0, minY = GRID, maxY = 0;
                trail.forEach(t => {
                    minX = Math.min(minX, t.x); maxX = Math.max(maxX, t.x);
                    minY = Math.min(minY, t.y); maxY = Math.max(maxY, t.y);
                });
                
                for (let y = minY; y <= maxY && !start; y++) {
                    for (let x = minX; x <= maxX && !start; x++) {
                        if (grid[y][x] === 0 && !trailSet.has(`${x},${y}`)) {
                            start = { x, y };
                        }
                    }
                }
            }
            
            if (!start) {
                trail.forEach(t => { if (grid[t.y][t.x] === trailId) grid[t.y][t.x] = 0; });
                return;
            }
            
            // BFS заливка
            const visited = new Set();
            const queue = [start];
            visited.add(`${start.x},${start.y}`);
            const captured = [];
            let isInside = true;
            
            while (queue.length > 0 && isInside) {
                const { x, y } = queue.shift();
                captured.push({ x, y });
                
                const dirs = [{ x: 0, y: -1 }, { x: 0, y: 1 }, { x: -1, y: 0 }, { x: 1, y: 0 }];
                for (const d of dirs) {
                    const nx = x + d.x, ny = y + d.y;
                    const key = `${nx},${ny}`;
                    
                    if (visited.has(key)) continue;
                    if (trailSet.has(key)) continue;
                    
                    if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) {
                        isInside = false;
                        break;
                    }
                    
                    // Может заливать пустые клетки И вражескую территорию И вражеский след
                    if (grid[ny][nx] === colorId) continue;
                    
                    visited.add(key);
                    queue.push({ x: nx, y: ny });
                }
            }
            
            if (isInside && captured.length > 0 && captured.length < (GRID * GRID / 2)) {
                captured.forEach(({ x, y }) => {
                    grid[y][x] = colorId;
                });
                trail.forEach(t => {
                    grid[t.y][t.x] = colorId;
                });
            } else {
                // Не замкнуто — стираем след
                trail.forEach(t => {
                    if (grid[t.y][t.x] === trailId) grid[t.y][t.x] = 0;
                });
            }
        }

        function update() {
            if (!gameRunning) return;
            
            if (p1.alive) movePlayer(p1, dir1, 1);
            if (p2.alive) movePlayer(p2, dir2, 2);
            
            if (!p1.alive || !p2.alive) {
                gameRunning = false;
                const winner = !p1.alive ? '🔵 Игрок 2' : '🔴 Игрок 1';
                setTimeout(() => Modal.show('Игра окончена', `${winner} победил!`).then(() => start()), 300);
                return;
            }
            
            updateScores();
            draw();
        }

        function updateScores() {
            document.getElementById('score1').textContent = countTerritory(1);
            document.getElementById('score2').textContent = countTerritory(2);
        }

        function countTerritory(id) {
            let count = 0;
            for (let r = 0; r < GRID; r++) for (let c = 0; c < GRID; c++) if (grid[r][c] === id) count++;
            return Math.round(count / (GRID * GRID) * 100);
        }

        function draw() {
            ctx.clearRect(0, 0, SIZE, SIZE);
            for (let r = 0; r < GRID; r++) {
                for (let c = 0; c < GRID; c++) {
                    if (grid[r][c] === 1) {
                        ctx.fillStyle = '#e94560';
                        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
                    } else if (grid[r][c] === 2) {
                        ctx.fillStyle = '#4a90d9';
                        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
                    } else if (grid[r][c] === 3) {
                        ctx.fillStyle = '#ff8888';
                        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
                    } else if (grid[r][c] === 4) {
                        ctx.fillStyle = '#8888ff';
                        ctx.fillRect(c * CELL, r * CELL, CELL, CELL);
                    }
                }
            }
            // Игроки
            if (p1.alive) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(p1.x * CELL - 1, p1.y * CELL - 1, CELL + 2, CELL + 2);
                ctx.fillStyle = '#e94560';
                ctx.fillRect(p1.x * CELL, p1.y * CELL, CELL, CELL);
            }
            if (p2.alive) {
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(p2.x * CELL - 1, p2.y * CELL - 1, CELL + 2, CELL + 2);
                ctx.fillStyle = '#4a90d9';
                ctx.fillRect(p2.x * CELL, p2.y * CELL, CELL, CELL);
            }
        }

        function setupJoystick(baseId, stickId, setDir) {
            const base = document.getElementById(baseId);
            const stick = document.getElementById(stickId);
            let active = false;

            base.addEventListener('pointerdown', (e) => {
                active = true;
                base.setPointerCapture(e.pointerId);
                moveStick(e);
            });
            base.addEventListener('pointermove', (e) => {
                if (!active) return;
                moveStick(e);
            });
            base.addEventListener('pointerup', () => {
                active = false;
                stick.style.transform = 'translate(-50%, -50%)';
                setDir(null);
            });

            function moveStick(e) {
                const rect = base.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                const dx = e.clientX - cx;
                const dy = e.clientY - cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const maxDist = 22;

                let mx = dx, my = dy;
                if (dist > maxDist) {
                    mx = dx / dist * maxDist;
                    my = dy / dist * maxDist;
                }

                stick.style.transform = `translate(calc(-50% + ${mx}px), calc(-50% + ${my}px))`;

                if (dist > 10) {
                    if (Math.abs(dx) > Math.abs(dy)) {
                        setDir(dx > 0 ? 'right' : 'left');
                    } else {
                        setDir(dy > 0 ? 'down' : 'up');
                    }
                }
            }
        }

        setupJoystick('joy1', 'stick1', (d) => { if (d && gameRunning) dir1 = d; });
        setupJoystick('joy2', 'stick2', (d) => { if (d && gameRunning) dir2 = d; });

        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            const keyMap = {
                'w': ['up', 1], 's': ['down', 1], 'a': ['left', 1], 'd': ['right', 1],
                'ArrowUp': ['up', 2], 'ArrowDown': ['down', 2], 'ArrowLeft': ['left', 2], 'ArrowRight': ['right', 2]
            };
            const action = keyMap[e.key];
            if (action) {
                e.preventDefault();
                if (action[1] === 1) dir1 = action[0];
                else dir2 = action[0];
            }
        });

        setInterval(update, 100);
        document.getElementById('newGame').addEventListener('click', start);
        start();
    </script>
</body>
</html>
