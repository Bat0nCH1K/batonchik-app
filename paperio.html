<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Paper.io — BatonCHIK Games</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; --text-secondary: #b0b0b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; touch-action: manipulation; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score-board { display: flex; justify-content: center; gap: 40px; margin: 10px 0; font-size: 16px; }
        .score-board span { color: #f0c040; font-weight: bold; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
        .joysticks { display: flex; justify-content: space-around; margin-top: 10px; }
        .joy-container { display: flex; flex-direction: column; align-items: center; }
        .joy-base { width: 100px; height: 100px; border-radius: 50%; background: var(--card); border: 2px solid var(--accent); position: relative; touch-action: none; }
        .joy-stick { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); transition: 0.05s; pointer-events: none; }
        .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="main.html" class="back">← Назад</a>
        <h2>🗺️ Paper.io</h2>
        <div class="score-board">
            <span>🔴 <span id="score1">4</span>%</span>
            <span>🔵 <span id="score2">4</span>%</span>
        </div>
        <canvas id="canvas" width="300" height="300"></canvas>
        <div class="joysticks">
            <div class="joy-container">
                <div class="label">Игрок 1 🔴</div>
                <div class="joy-base" id="joy1">
                    <div class="joy-stick" id="stick1"></div>
                </div>
            </div>
            <div class="joy-container">
                <div class="label">Игрок 2 🔵</div>
                <div class="joy-base" id="joy2">
                    <div class="joy-stick" id="stick2"></div>
                </div>
            </div>
        </div>
        <button class="btn" id="newGame">🔄 Новая игра</button>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script src="modals.js"></script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        SFX.playMusic('action');
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const SIZE = 300, CELL = 6, GRID = 50;
        let grid, p1, p2, dir1='right', dir2='left', lastDir1='right', lastDir2='left', gameRunning=true;
        const OPPOSITE = { up:'down', down:'up', left:'right', right:'left' };
        const DX = { up:0, down:0, left:-1, right:1 };
        const DY = { up:-1, down:1, left:0, right:0 };

        function start() {
            grid = Array(GRID).fill().map(()=>Array(GRID).fill(0));
            for (let r=8; r<13; r++) for (let c=8; c<13; c++) grid[r][c]=1;
            for (let r=37; r<42; r++) for (let c=37; c<42; c++) grid[r][c]=2;
            p1={x:10,y:10,trail:[],alive:true}; p2={x:39,y:39,trail:[],alive:true};
            dir1='right'; lastDir1='right'; dir2='left'; lastDir2='left'; gameRunning=true;
            updateScores(); draw();
        }

        function movePlayer(p, newDir, id) {
            if (!p||!p.alive||!gameRunning) return;
            const trailId=id===1?3:4, baseId=id, enemyTrailId=id===1?4:3;
            const lastDir=id===1?lastDir1:lastDir2;
            if (newDir===OPPOSITE[lastDir]) newDir=lastDir;
            if (id===1) lastDir1=newDir; else lastDir2=newDir;
            const nx=p.x+DX[newDir], ny=p.y+DY[newDir];
            if (nx<0||nx>=GRID||ny<0||ny>=GRID) { killPlayer(p,id); return; }
            const cell=grid[ny][nx];
            if (cell===enemyTrailId) { const enemy=id===1?p2:p1; killPlayer(enemy,id===1?2:1); }
            if (cell===baseId&&p.trail.length>0) { captureTerritory(p,id); p.trail=[]; p.x=nx; p.y=ny; return; }
            if (cell===trailId) { killPlayer(p,id); return; }
            if (cell===0||cell===enemyTrailId||(cell!==baseId&&cell!==trailId)) {
                p.trail.push({x:nx,y:ny}); grid[ny][nx]=trailId; p.x=nx; p.y=ny; return;
            }
            if (cell===baseId) { p.x=nx; p.y=ny; return; }
            p.x=nx; p.y=ny;
        }

        function killPlayer(p,id) {
            if (!p.alive) return; p.alive=false;
            const trailId=id===1?3:4;
            for (let r=0; r<GRID; r++) for (let c=0; c<GRID; c++) if (grid[r][c]===trailId) grid[r][c]=0;
            p.trail=[]; SFX.death();
        }

        function captureTerritory(p,id) {
            if (p.trail.length<4) { const trailId=id===1?3:4; for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) if (grid[r][c]===trailId) grid[r][c]=0; return; }
            const trailSet=new Set(p.trail.map(t=>`${t.x},${t.y}`));
            let minX=GRID,maxX=-1,minY=GRID,maxY=-1;
            p.trail.forEach(t=>{ if(t.x<minX)minX=t.x; if(t.x>maxX)maxX=t.x; if(t.y<minY)minY=t.y; if(t.y>maxY)maxY=t.y; });
            let start=null;
            for (let y=minY; y<=maxY&&!start; y++) for (let x=minX; x<=maxX&&!start; x++) if (!trailSet.has(`${x},${y}`)&&grid[y][x]!==id) start={x,y};
            if (!start) { const trailId=id===1?3:4; for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) if (grid[r][c]===trailId) grid[r][c]=0; return; }
            const visited=new Set(), queue=[start], captured=[];
            visited.add(`${start.x},${start.y}`); let isInside=true;
            while (queue.length>0&&isInside) {
                const {x,y}=queue.shift(); captured.push({x,y});
                for (const d of [{x:1,y:0},{x:-1,y:0},{x:0,y:1},{x:0,y:-1}]) {
                    const nx=x+d.x, ny=y+d.y, key=`${nx},${ny}`;
                    if (visited.has(key)) continue; if (trailSet.has(key)) continue;
                    if (nx<0||nx>=GRID||ny<0||ny>=GRID) { isInside=false; break; }
                    if (grid[ny][nx]===id) continue;
                    visited.add(key); queue.push({x:nx,y:ny});
                }
            }
            if (isInside&&captured.length>0&&captured.length<2000) {
                captured.forEach(({x,y})=>grid[y][x]=id);
                p.trail.forEach(t=>grid[t.y][t.x]=id); SFX.win();
            } else {
                const trailId=id===1?3:4;
                for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) if (grid[r][c]===trailId) grid[r][c]=0;
            }
        }

        function update() {
            if (!gameRunning) return;
            movePlayer(p1,dir1,1); movePlayer(p2,dir2,2);
            if (!p1.alive||!p2.alive) {
                gameRunning=false;
                let w=!p1.alive&&!p2.alive?'Ничья!':(!p1.alive?'🔵 Игрок 2':'🔴 Игрок 1')+' победил!';
                setTimeout(()=>Modal.show('Игра окончена',w).then(()=>start()),300);
                return;
            }
            updateScores(); draw();
        }

        function updateScores() {
            let c1=0,c2=0;
            for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) { if (grid[r][c]===1)c1++; else if (grid[r][c]===2)c2++; }
            document.getElementById('score1').textContent=Math.round(c1/(GRID*GRID)*100);
            document.getElementById('score2').textContent=Math.round(c2/(GRID*GRID)*100);
        }

        function draw() {
            ctx.clearRect(0,0,SIZE,SIZE); ctx.fillStyle='#1a1a3e'; ctx.fillRect(0,0,SIZE,SIZE);
            const cs=SIZE/GRID;
            for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
                const x=c*cs,y=r*cs;
                if (grid[r][c]===1){ctx.fillStyle='#e94560';ctx.fillRect(x,y,cs,cs);}
                else if (grid[r][c]===2){ctx.fillStyle='#4a90d9';ctx.fillRect(x,y,cs,cs);}
                else if (grid[r][c]===3){ctx.fillStyle='#ffaaaa';ctx.fillRect(x,y,cs,cs);}
                else if (grid[r][c]===4){ctx.fillStyle='#aaaaff';ctx.fillRect(x,y,cs,cs);}
            }
            if (p1&&p1.alive){ctx.fillStyle='#fff';ctx.fillRect(p1.x*cs-1,p1.y*cs-1,cs+2,cs+2);ctx.fillStyle='#f00';ctx.fillRect(p1.x*cs,p1.y*cs,cs,cs);}
            if (p2&&p2.alive){ctx.fillStyle='#fff';ctx.fillRect(p2.x*cs-1,p2.y*cs-1,cs+2,cs+2);ctx.fillStyle='#00f';ctx.fillRect(p2.x*cs,p2.y*cs,cs,cs);}
        }

        function setupJoystick(baseId,stickId,playerId){
            const base=document.getElementById(baseId),stick=document.getElementById(stickId);
            let active=false;
            base.addEventListener('pointerdown',e=>{active=true;base.setPointerCapture(e.pointerId);moveStick(e);});
            base.addEventListener('pointermove',e=>{if(!active)return;moveStick(e);});
            base.addEventListener('pointerup',()=>{active=false;stick.style.transform='translate(-50%,-50%)';});
            base.addEventListener('pointerleave',()=>{active=false;stick.style.transform='translate(-50%,-50%)';});
            function moveStick(e){
                const rect=base.getBoundingClientRect(),cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
                const dx=e.clientX-cx,dy=e.clientY-cy,dist=Math.sqrt(dx*dx+dy*dy),maxDist=30;
                let mx=dx,my=dy;
                if(dist>maxDist){mx=dx/dist*maxDist;my=dy/dist*maxDist;}
                stick.style.transform=`translate(calc(-50% + ${mx}px), calc(-50% + ${my}px))`;
                if(dist>12){let d=Math.abs(dx)>Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'down':'up');if(playerId===1)dir1=d;else dir2=d;}
            }
        }
        setupJoystick('joy1','stick1',1); setupJoystick('joy2','stick2',2);

        document.addEventListener('keydown',e=>{
            const m={w:'up',s:'down',a:'left',d:'right',ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};
            const d=m[e.key]; if(!d)return; e.preventDefault();
            if (['w','s','a','d'].includes(e.key)) dir1=d; else dir2=d;
        });

        setInterval(update,150);
        document.getElementById('newGame').addEventListener('click',start);
        start();
    </script>
</body>
</html>
