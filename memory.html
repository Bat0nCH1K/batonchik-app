<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цветовая память — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        .game-board { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 240px; margin: 20px auto; }
        .color-btn { width: 110px; height: 110px; border-radius: 16px; cursor: pointer; transition: transform 0.1s, filter 0.3s; border: 3px solid transparent; }
        .color-btn:active { transform: scale(0.95); }
        .color-btn.active { filter: brightness(2.5); border-color: #fff; }
        .color-btn.red { background: #e94560; }
        .color-btn.blue { background: #4a90d9; }
        .color-btn.green { background: #4caf84; }
        .color-btn.yellow { background: #f0c040; }
        .start-overlay {
            background: var(--accent); color: white; padding: 16px 32px; border-radius: 14px;
            font-size: 20px; font-weight: bold; cursor: pointer; display: inline-block; margin: 10px;
        }
        .message { font-size: 18px; margin: 10px 0; min-height: 28px; }
        .record { font-size: 14px; color: #f0c040; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>🧠 Цветовая память</h2>
        <div class="score">Уровень: <span id="memLevel">0</span></div>
        <div class="record">🏆 Рекорд: <span id="memRecord">0</span></div>
        <div class="game-board" id="gameBoard">
            <div class="color-btn red" data-color="0"></div>
            <div class="color-btn blue" data-color="1"></div>
            <div class="color-btn green" data-color="2"></div>
            <div class="color-btn yellow" data-color="3"></div>
        </div>
        <div class="message" id="memMessage">Нажми Старт</div>
        <div class="start-overlay" id="memStart">▶ Старт</div>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script>
        SFX.playMusic('sweden');
        const memorySounds = [SFX.memory0, SFX.memory1, SFX.memory2, SFX.memory3];
        let sequence = [], playerSeq = [], level = 0, showing = false, canClick = false;

        document.getElementById('memRecord').textContent = Highscores.get('memory');

        function start() {
            sequence = []; playerSeq = []; level = 0;
            document.getElementById('memLevel').textContent = '0';
            document.getElementById('memMessage').textContent = 'Нажми Старт';
            document.getElementById('memStart').style.display = 'inline-block';
            canClick = false;
        }

        async function launch() {
            document.getElementById('memStart').style.display = 'none';
            sequence = []; playerSeq = []; level = 1;
            document.getElementById('memLevel').textContent = '1';
            addToSequence();
            await showSequence();
        }

        function addToSequence() { sequence.push(Math.floor(Math.random()*4)); }

        async function showSequence() {
            showing = true; canClick = false;
            document.getElementById('memMessage').textContent = 'Запомни...';
            for (const color of sequence) {
                await activate(color);
                await sleep(300);
            }
            showing = false; canClick = true;
            playerSeq = [];
            document.getElementById('memMessage').textContent = 'Повтори!';
        }

        function activate(color) {
            return new Promise(resolve => {
                const btn = document.querySelector(`.color-btn[data-color="${color}"]`);
                btn.classList.add('active');
                memorySounds[color]();
                setTimeout(() => { btn.classList.remove('active'); resolve(); }, 350);
            });
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        function playerClick(color) {
            if (!canClick || showing) return;
            playerSeq.push(color);
            activate(color);
            
            if (playerSeq[playerSeq.length-1] !== sequence[playerSeq.length-1]) {
                canClick = false;
                SFX.lose();
                Highscores.save('memory', level);
                document.getElementById('memRecord').textContent = Highscores.get('memory');
                document.getElementById('memMessage').textContent = '❌ Ошибка! Уровень: ' + level;
                document.getElementById('memStart').style.display = 'inline-block';
                return;
            }

            if (playerSeq.length === sequence.length) {
                canClick = false;
                level++;
                document.getElementById('memLevel').textContent = level;
                Highscores.save('memory', level);
                document.getElementById('memRecord').textContent = Highscores.get('memory');
                if (level >= 20) localStorage.setItem('earned_MEMORY-KING', '1');
                document.getElementById('memMessage').textContent = '✅ Уровень ' + level + '!';
                SFX.coin();
                addToSequence();
                setTimeout(showSequence, 600);
            }
        }

        document.getElementById('memStart').addEventListener('click', launch);
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => playerClick(parseInt(btn.dataset.color)));
        });

        start();
    </script>
</body>
</html>
