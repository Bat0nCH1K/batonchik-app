<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИИ-Викторина — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --green: #4caf84; --text: #fff; --text-secondary: #b0b0b0; --radius: 14px; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; touch-action: manipulation; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 16px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .btn:disabled { opacity: 0.4; }
        .quiz-card { background: var(--card); border-radius: var(--radius); padding: 20px; margin-top: 16px; }
        .question-text { font-size: 17px; margin-bottom: 16px; line-height: 1.4; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .option-btn { background: #0f3460; color: white; padding: 14px; border: 2px solid #4a90d9; border-radius: var(--radius); font-size: 15px; cursor: pointer; font-weight: bold; }
        .option-btn.correct { background: var(--green); border-color: var(--green); }
        .option-btn.wrong { background: var(--accent); border-color: var(--accent); }
        .feedback { margin-top: 14px; font-size: 17px; font-weight: bold; }
        .stats { margin-top: 16px; color: var(--text-secondary); font-size: 14px; }
        .record { font-size: 14px; color: #f0c040; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>🧠 ИИ-Викторина</h2>
        <button class="btn" id="newQuestionBtn">🎲 Новый вопрос</button>
        <div class="quiz-card" id="quizCard" style="display:none;">
            <div class="question-text" id="questionText"></div>
            <div class="options-grid" id="optionsGrid"></div>
            <div class="feedback" id="feedback"></div>
        </div>
        <div class="stats" id="stats">Правильных: 0 | Всего: 0</div>
        <div class="record">🏆 Рекорд: <span id="quizRecord">0</span></div>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script>
        SFX.playMusic('bonetrousle');
        let correct=0, total=0, answered=false, question=null;
        document.getElementById('quizRecord').textContent = Highscores.get('quiz');

        document.getElementById('newQuestionBtn').addEventListener('click', getQuestion);

        async function getQuestion() {
            const btn = document.getElementById('newQuestionBtn');
            const card = document.getElementById('quizCard');
            btn.disabled = true; btn.textContent = '⏳';
            card.style.display = 'block';
            document.getElementById('questionText').textContent = 'ИИ думает...';
            document.getElementById('optionsGrid').innerHTML = '';
            document.getElementById('feedback').textContent = '';
            answered = false;
            question = null;

            const topics = ['история','география','наука','космос','животные','спорт','кино','музыка','технологии','еда'];
            const topic = topics[Math.floor(Math.random()*topics.length)];

            const prompt = `Ты — ведущий викторины. Придумай ОДИН вопрос на русском языке на тему "${topic}".
4 варианта ответа, из них только ОДИН правильный.
ОТВЕТЬ ТОЛЬКО валидным JSON, без markdown, без пояснений. Формат:
{"q":"Текст вопроса?","o":["Ответ1","Ответ2","Ответ3","Ответ4"],"c":0}
Где "c" — индекс правильного ответа (0, 1, 2 или 3).`;

            for (let attempt=0; attempt<4; attempt++) {
                try {
                    const resp = await fetch('https://text.pollinations.ai/openai', {
                        method:'POST',
                        headers:{'Content-Type':'application/json'},
                        body:JSON.stringify({
                            model:'openai',
                            messages:[{role:'user',content:prompt}],
                            temperature:1.3,
                            max_tokens:250
                        })
                    });
                    const data = await resp.json();
                    const raw = (data.choices?.[0]?.message?.content || '').trim();
                    
                    const m = raw.match(/\{[\s\S]*\}/);
                    if (!m) continue;
                    let p;
                    try { p = JSON.parse(m[0]); } catch(e) { continue; }
                    
                    const q = p.q || p.question;
                    const o = p.o || p.options;
                    const c = p.c !== undefined ? p.c : p.correctIndex;
                    
                    if (!q || !o || o.length!==4 || c===undefined || c<0 || c>3) continue;
                    if (o.some(x=>!x||x.length<1)) continue;
                    if (new Set(o).size < 4) continue;
                    
                    question = { question:q, options:o, correctIndex:c };
                    break;
                } catch(e) { continue; }
            }

            if (!question) {
                document.getElementById('questionText').textContent = '😵 ИИ перегружен. Попробуй ещё раз!';
                btn.disabled = false; btn.textContent = '🎲 Попробовать снова';
                return;
            }

            document.getElementById('questionText').textContent = question.question;
            document.getElementById('optionsGrid').innerHTML = question.options.map((o,i) =>
                '<button class="option-btn" data-idx="'+i+'">'+o+'</button>').join('');
            document.querySelectorAll('.option-btn').forEach(b => {
                b.addEventListener('click', function(){ checkAnswer(parseInt(this.dataset.idx), this); });
            });
            btn.disabled = false; btn.textContent = '🎲 Новый вопрос';
        }

        function checkAnswer(i, btn) {
            if (answered || !question) return;
            answered = true; total++;
            const allBtns = document.querySelectorAll('.option-btn');
            allBtns.forEach(b=>b.disabled=true);
            if (i===question.correctIndex) {
                btn.classList.add('correct');
                document.getElementById('feedback').textContent = '✅ Правильно!';
                correct++; SFX.coin();
            } else {
                btn.classList.add('wrong');
                allBtns[question.correctIndex].classList.add('correct');
                document.getElementById('feedback').textContent = '❌ Неправильно!';
            }
            document.getElementById('stats').textContent = 'Правильных: '+correct+' | Всего: '+total;
            Highscores.save('quiz', correct);
            document.getElementById('quizRecord').textContent = Highscores.get('quiz');
        }

        getQuestion();
    </script>
</body>
</html>
