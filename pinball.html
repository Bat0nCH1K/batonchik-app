<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пинбол — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>🕹️ Пинбол</h2>
        <div class="score">Очки: <span id="pbScore">0</span></div>
        <canvas id="pbCanvas" width="300" height="450"></canvas>
        <button class="btn" id="startPB">▶ Старт</button>
        <p style="color:var(--text-secondary);font-size:12px;">Кнопки — флипперы. Мяч запускается пружиной.</p>
    </div>
    <script>
        const canvas = document.getElementById('pbCanvas'), ctx = canvas.getContext('2d');
        let ball = { x:150, y:400, vx:0, vy:0, r:7 };
        let flipperLAngle = 0.3, flipperRAngle = -0.3;
        let bumpers = [];
        let score = 0, interval = null, running = false, launched = false;
        let leftDown = false, rightDown = false;
        let springPower = 0;

        const fixedBumpers = [
            {x:80,y:80,r:18},{x:220,y:80,r:18},{x:150,y:140,r:22},
            {x:60,y:200,r:16},{x:240,y:200,r:16},{x:150,y:260,r:20},
            {x:100,y:320,r:16},{x:200,y:320,r:16}
        ];

        function start() {
            score = 0; document.getElementById('pbScore').textContent = '0';
            ball = { x:150, y:400, vx:0, vy:0, r:7 };
            bumpers = [...fixedBumpers];
            running = false; launched = false; springPower = 0;
            document.getElementById('startPB').style.display = 'block';
            draw();
        }

        function launch() {
            if (running) return;
            running = true; launched = true;
            document.getElementById('startPB').style.display = 'none';
            ball.vx = (Math.random()-0.5)*2;
            ball.vy = -8 - springPower*0.3;
            springPower = 0;
            if (interval) clearInterval(interval);
            interval = setInterval(update, 16);
        }

        function update() {
            if (!running) return;
            ball.vy += 0.2;
            ball.x += ball.vx; ball.y += ball.vy;

            if (ball.x-ball.r <= 0) { ball.x=ball.r; ball.vx=Math.abs(ball.vx); }
            if (ball.x+ball.r >= 300) { ball.x=300-ball.r; ball.vx=-Math.abs(ball.vx); }
            if (ball.y-ball.r <= 0) { ball.y=ball.r; ball.vy=Math.abs(ball.vy); }

            // Флипперы — отбрасывают мяч
            if (ball.y+ball.r >= 410 && ball.y-ball.r <= 430) {
                if (ball.x < 150 && leftDown) { ball.vy = -9; ball.vx = -5; score+=5; document.getElementById('pbScore').textContent=score; }
                else if (ball.x >= 150 && rightDown) { ball.vy = -9; ball.vx = 5; score+=5; document.getElementById('pbScore').textContent=score; }
            }

            // Бамперы
            bumpers.forEach(b => {
                const dx = ball.x-b.x, dy = ball.y-b.y, dist = Math.sqrt(dx*dx+dy*dy);
                if (dist < ball.r+b.r) {
                    const nx = dx/dist, ny = dy/dist;
                    ball.vx = nx*7; ball.vy = ny*7;
                    ball.x += nx*(ball.r+b.r-dist);
                    ball.y += ny*(ball.r+b.r-dist);
                    score+=15; document.getElementById('pbScore').textContent=score;
                }
            });

            if (ball.y > 470) { clearInterval(interval); running=false; launched=false; alert('💀 Мяч упал! Очки: '+score); start(); return; }
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // Бамперы
            ctx.fillStyle = '#ff9800';
            bumpers.forEach(b => { ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); });
            // Мяч
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
            // Флипперы
            ctx.fillStyle = leftDown ? '#e94560' : '#666';
            ctx.save(); ctx.translate(60, 420); ctx.rotate(leftDown ? -0.5 : 0.3); ctx.fillRect(-50, -5, 100, 10); ctx.restore();
            ctx.fillStyle = rightDown ? '#e94560' : '#666';
            ctx.save(); ctx.translate(240, 420); ctx.rotate(rightDown ? 0.5 : -0.3); ctx.fillRect(-50, -5, 100, 10); ctx.restore();
            // Пружина
            ctx.fillStyle = '#aaa';
            ctx.fillRect(145, 440-springPower, 10, 20+springPower);
        }

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left;
            if (x < 150) leftDown = true; else rightDown = true;
        });
        canvas.addEventListener('touchend', () => { leftDown = false; rightDown = false; });
        canvas.addEventListener('mousedown', e => {
            const rect = canvas.getBoundingClientRect();
            if (e.clientX-rect.left < 150) leftDown = true; else rightDown = true;
        });
        canvas.addEventListener('mouseup', () => { leftDown = false; rightDown = false; });

        // Запуск по пробелу или кнопке Старт
        document.getElementById('startPB').addEventListener('click', () => {
            if (!launched) { springPower = Math.min(60, springPower+15); draw(); setTimeout(launch, 300); }
        });

        start();
    </script>
</body>
</html>
