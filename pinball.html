<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пинбол — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        .canvas-wrap { position: relative; display: inline-block; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
        .start-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--accent); color: white; padding: 16px 32px; border-radius: 14px;
            font-size: 20px; font-weight: bold; cursor: pointer; z-index: 10;
        }
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .ctrl { width: 55px; height: 55px; border-radius: 14px; background: var(--card); color: var(--text); border: 2px solid var(--accent); font-size: 24px; cursor: pointer; font-weight: bold; }
        .ctrl:active { background: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>🕹️ Пинбол</h2>
        <div class="score">Очки: <span id="pbScore">0</span></div>
        <div class="canvas-wrap">
            <canvas id="pbCanvas" width="300" height="450"></canvas>
            <div class="start-overlay" id="pbStart">▶ Старт</div>
        </div>
        <div class="controls">
            <button class="ctrl" id="pbLeft">◀</button>
            <button class="ctrl" id="pbRight">▶</button>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('pbCanvas'), ctx = canvas.getContext('2d');
        let ball = { x:150, y:300, vx:0, vy:0, r:9 };
        let bumpers = [];
        let score = 0, interval = null, running = false;
        let leftDown = false, rightDown = false;

        const fixedBumpers = [
            {x:80,y:70,r:18},{x:220,y:70,r:18},{x:150,y:130,r:22},
            {x:60,y:190,r:16},{x:240,y:190,r:16},{x:150,y:250,r:20},
            {x:100,y:310,r:16},{x:200,y:310,r:16}
        ];

        function start() {
            score = 0; document.getElementById('pbScore').textContent = '0';
            ball = { x:150, y:300, vx:0, vy:0, r:9 };
            bumpers = [...fixedBumpers];
            running = false;
            document.getElementById('pbStart').style.display = 'block';
            draw();
        }

        function launch() {
            running = true;
            document.getElementById('pbStart').style.display = 'none';
            ball.vx = (Math.random()-0.5)*3;
            ball.vy = -10;
            if (interval) clearInterval(interval);
            interval = setInterval(update, 16);
        }

        function update() {
            if (!running) return;
            ball.vy += 0.18;
            ball.x += ball.vx; ball.y += ball.vy;

            if (ball.x-ball.r <= 0) { ball.x=ball.r; ball.vx=Math.abs(ball.vx); }
            if (ball.x+ball.r >= 300) { ball.x=300-ball.r; ball.vx=-Math.abs(ball.vx); }
            if (ball.y-ball.r <= 0) { ball.y=ball.r; ball.vy=Math.abs(ball.vy); }

            // Флипперы — обе могут работать одновременно
            const flipperY = 410, flipperH = 12, flipperW = 100;
            if (ball.vy > 0 && ball.y+ball.r >= flipperY && ball.y-ball.r <= flipperY+flipperH) {
                const leftFlipper = { x1:10, y1:flipperY, x2:10+flipperW, y2:flipperY };
                const rightFlipper = { x1:190, y1:flipperY, x2:190+flipperW, y2:flipperY };
                if (leftDown && ball.x+ball.r > 10 && ball.x-ball.r < 10+flipperW+20) {
                    ball.vy = -Math.abs(ball.vy) - 4;
                    ball.vx += (ball.x < 60 ? -3 : 0);
                    score += 5; document.getElementById('pbScore').textContent = score;
                }
                if (rightDown && ball.x+ball.r > 180 && ball.x-ball.r < 190+flipperW+20) {
                    ball.vy = -Math.abs(ball.vy) - 4;
                    ball.vx += (ball.x > 240 ? 3 : 0);
                    score += 5; document.getElementById('pbScore').textContent = score;
                }
            }

            // Бамперы
            bumpers.forEach(b => {
                const dx = ball.x-b.x, dy = ball.y-b.y, dist = Math.sqrt(dx*dx+dy*dy);
                if (dist < ball.r+b.r) {
                    const nx = dx/dist, ny = dy/dist;
                    ball.vx = nx*7; ball.vy = ny*7;
                    ball.x += nx*(ball.r+b.r-dist);
                    ball.y += ny*(ball.r+b.r-dist);
                    score+=15; document.getElementById('pbScore').textContent=score;
                }
            });

            if (ball.y > 470) { clearInterval(interval); running=false; alert('💀 Мяч упал! Очки: '+score); start(); return; }
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // Бамперы
            ctx.fillStyle = '#ff9800';
            bumpers.forEach(b => { ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill(); });
            // Мяч
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
            // Левый флиппер
            ctx.fillStyle = leftDown ? '#e94560' : '#666';
            ctx.fillRect(10, 410, 100, 12);
            // Правый флиппер
            ctx.fillStyle = rightDown ? '#e94560' : '#666';
            ctx.fillRect(190, 410, 100, 12);
            // Закрыть проходы
            ctx.fillStyle = '#0a0a1a';
            ctx.fillRect(0, 408, 10, 16);
            ctx.fillRect(290, 408, 10, 16);
            // Пружина
            ctx.fillStyle = '#aaa';
            ctx.fillRect(145, 430, 10, 20);
        }

        document.getElementById('pbStart').addEventListener('click', launch);
        document.getElementById('pbLeft').addEventListener('pointerdown', () => leftDown = true);
        document.getElementById('pbLeft').addEventListener('pointerup', () => leftDown = false);
        document.getElementById('pbRight').addEventListener('pointerdown', () => rightDown = true);
        document.getElementById('pbRight').addEventListener('pointerup', () => rightDown = false);

        start();
    </script>
</body>
</html>
