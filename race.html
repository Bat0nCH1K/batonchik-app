<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Гонки — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        .canvas-wrap { position: relative; display: inline-block; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
        .start-overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--accent); color: white; padding: 16px 32px; border-radius: 14px;
            font-size: 20px; font-weight: bold; cursor: pointer; z-index: 10;
        }
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .ctrl { width: 55px; height: 55px; border-radius: 14px; background: var(--card); color: var(--text); border: 2px solid var(--accent); font-size: 24px; cursor: pointer; font-weight: bold; }
        .ctrl:active { background: var(--accent); }
        .record { font-size: 14px; color: #f0c040; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>🏎️ Гонки</h2>
        <div class="score">Очки: <span id="raceScore">0</span></div>
        <div class="record">🏆 Рекорд: <span id="raceRecord">0</span></div>
        <div class="canvas-wrap">
            <canvas id="raceCanvas" width="300" height="400"></canvas>
            <div class="start-overlay" id="raceStart">▶ Старт</div>
        </div>
        <div class="controls">
            <button class="ctrl" id="raceLeft">←</button>
            <button class="ctrl" id="raceRight">→</button>
        </div>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script src="modals.js"></script>
    <script>
        SFX.playMusic('subway');
        const PLAYER_IMG = new Image();
        PLAYER_IMG.src = 'https://github.com/Bat0nCH1K/batonchik-app/releases/download/v1.0/IMG_20260531_122114.png';
        const OBSTACLE_IMG = new Image();
        OBSTACLE_IMG.src = 'https://github.com/Bat0nCH1K/batonchik-app/releases/download/v1.0/lv_0_20260531105241.png';
        const TRUCK_IMG = new Image();
        TRUCK_IMG.src = 'https://github.com/Bat0nCH1K/batonchik-app/releases/download/v1.0/IMG_20260531_125358.png';

        const canvas = document.getElementById('raceCanvas'), ctx = canvas.getContext('2d');
        let player = { x:130, y:340, w:40, h:50 }, obstacles = [], score = 0, interval = null, gameOver = false;
        let leftDown = false, rightDown = false, speed = 3, spawnTimer = 0, running = false;

        document.getElementById('raceRecord').textContent = Highscores.get('race');

        function start() {
            score = 0; obstacles = []; gameOver = false; speed = 3; spawnTimer = 0; running = false;
            document.getElementById('raceScore').textContent = '0';
            document.getElementById('raceStart').style.display = 'block';
            player.x = 130;
            if (interval) clearInterval(interval);
            draw();
        }

        function launch() {
            running = true; document.getElementById('raceStart').style.display = 'none';
            interval = setInterval(update, 30);
        }

        function spawn() {
            const isTruck = Math.random() < 0.25;
            const w = isTruck ? 50 : 40;
            const h = isTruck ? 80 : 60;
            const x = Math.random() * (300 - w);
            obstacles.push({ x, y: -h, w, h, isTruck, passed: false });
        }

        function update() {
            if (!running || gameOver) return;
            if (leftDown && player.x > 0) player.x -= 5;
            if (rightDown && player.x < 260) player.x += 5;

            spawnTimer++;
            if (spawnTimer > Math.max(20, 60 - speed*5)) { spawn(); spawnTimer = 0; }

            obstacles = obstacles.filter(o => o.y < 420);
            obstacles.forEach(o => {
                o.y += speed;
                if (!o.passed && o.y > player.y+player.h) { o.passed = true; score += o.isTruck ? 2 : 1; document.getElementById('raceScore').textContent = score; }
            });

            if (score > 0 && score % 20 === 0) speed = Math.min(8, 3 + score/20);

            for (const o of obstacles) {
                // Хитбокс чуть меньше текстуры
                const marginX = 5, marginY = 8;
                if (player.x+marginX < o.x+o.w-marginX && player.x+player.w-marginX > o.x+marginX && 
                    player.y+marginY < o.y+o.h-marginY && player.y+player.h-marginY > o.y+marginY) {
                    clearInterval(interval); gameOver = true; running = false;
                    const isNew = Highscores.save('race', score);
                    document.getElementById('raceRecord').textContent = Highscores.get('race');
                    Modal.show('💥 Разбился!', `Очки: ${score}${isNew ? '\n🏆 Новый рекорд!' : ''}`).then(() => start());
                    return;
                }
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // Дорога
            ctx.fillStyle = '#555';
            for (let i=0; i<400; i+=50) ctx.fillRect(148, (i+frame*3)%400-50, 4, 30);
            
            // Игрок — сохраняем соотношение сторон, размер больше хитбокса
            if (PLAYER_IMG.complete && PLAYER_IMG.naturalWidth > 0) {
                const imgW = player.w + 10, imgH = player.h + 10;
                ctx.drawImage(PLAYER_IMG, player.x-5, player.y-5, imgW, imgH);
            } else {
                ctx.fillStyle = '#4a90d9'; ctx.fillRect(player.x, player.y, player.w, player.h);
            }
            
            // Препятствия — сохраняем соотношение
            obstacles.forEach(o => {
                const img = o.isTruck ? TRUCK_IMG : OBSTACLE_IMG;
                if (img.complete && img.naturalWidth > 0) {
                    ctx.drawImage(img, o.x-5, o.y-5, o.w+10, o.h+10);
                } else {
                    ctx.fillStyle = o.isTruck ? '#4caf84' : '#e94560'; 
                    ctx.fillRect(o.x, o.y, o.w, o.h);
                }
            });
        }

        let frame = 0;
        const origUpdate = update;
        update = function() { frame++; origUpdate(); };

        document.getElementById('raceStart').addEventListener('click', launch);
        document.getElementById('raceLeft').addEventListener('pointerdown', () => leftDown = true);
        document.getElementById('raceLeft').addEventListener('pointerup', () => leftDown = false);
        document.getElementById('raceRight').addEventListener('pointerdown', () => rightDown = true);
        document.getElementById('raceRight').addEventListener('pointerup', () => rightDown = false);

        start();
    </script>
</body>
</html>
