<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гонки — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; touch-action: manipulation; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
        .record { font-size: 14px; color: #f0c040; margin-top: 5px; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="main.html" class="back">← Назад</a>
        <h2>🏎️ Гонки</h2>
        <div class="score">Очки: <span id="raceScore">0</span></div>
        <div class="record">🏆 Рекорд: <span id="raceRecord">0</span></div>
        <canvas id="raceCanvas" width="300" height="400"></canvas>
        <p style="color:var(--text-secondary);">Перетаскивай машину пальцем</p>
        <button class="btn" id="raceNewGame">🔄 Новая игра</button>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script src="modals.js"></script>
    <script>
        SFX.playMusic('subway');
        const canvas = document.getElementById('raceCanvas'), ctx = canvas.getContext('2d');
        let car = { x: 130, y: 320, w: 40, h: 60 };
        let obstacles = [], score = 0, interval = null, running = false;
        const PW = 50, PG = 150;
        document.getElementById('raceRecord').textContent = Highscores.get('race');

        function start() {
            score = 0; running = false;
            document.getElementById('raceScore').textContent = '0';
            car.x = 130; obstacles = [];
            if (interval) clearInterval(interval);
            draw();
            setTimeout(() => { running = true; interval = setInterval(update, 30); }, 500);
        }

        function update() {
            if (!running) return;
            
            // Движение препятствий
            if (Math.random() < 0.03) {
                const lx = 50 + Math.random() * 100;
                obstacles.push({ x: lx, y: -60, w: PW, h: 20, passed: false });
            }
            
            for (let i = obstacles.length-1; i >= 0; i--) {
                obstacles[i].y += 4;
                if (obstacles[i].y > 420) {
                    obstacles.splice(i, 1);
                } else if (!obstacles[i].passed && obstacles[i].y > car.y + car.h) {
                    obstacles[i].passed = true;
                    score += 10;
                    document.getElementById('raceScore').textContent = score;
                    SFX.coin();
                }
            }
            
            // Коллизия
            for (const o of obstacles) {
                if (car.x < o.x+o.w && car.x+car.w > o.x && car.y < o.y+o.h && car.y+car.h > o.y) {
                    clearInterval(interval); running = false;
                    const isNew = Highscores.save('race', score);
                    document.getElementById('raceRecord').textContent = Highscores.get('race');
                    Modal.show('💀 Авария!', `Очки: ${score}${isNew?'\n🏆 Новый рекорд!':''}`).then(() => start());
                    return;
                }
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            // Дорога
            ctx.fillStyle = '#333';
            ctx.fillRect(50, 0, 200, 400);
            // Разметка
            ctx.fillStyle = '#fff';
            for (let y = 0; y < 400; y += 40) ctx.fillRect(148, (y+frame*4)%400, 4, 20);
            // Машина
            ctx.fillStyle = '#e94560';
            ctx.fillRect(car.x, car.y, car.w, car.h);
            ctx.fillStyle = '#fff';
            ctx.fillRect(car.x+5, car.y+5, 10, 15);
            ctx.fillRect(car.x+25, car.y+5, 10, 15);
            // Препятствия
            ctx.fillStyle = '#ff9800';
            obstacles.forEach(o => ctx.fillRect(o.x, o.y, o.w, o.h));
        }

        let frame = 0;
        setInterval(() => { frame++; }, 16);

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const x = e.touches[0].clientX - rect.left - car.w/2;
            car.x = Math.max(50, Math.min(250-car.w, x));
        });
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left - car.w/2;
            car.x = Math.max(50, Math.min(250-car.w, x));
        });

        document.getElementById('raceNewGame').addEventListener('click', start);
        start();
    </script>
</body>
</html>
