<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Merge — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; --text-secondary: #b0b0b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
        .record { font-size: 14px; color: #f0c040; margin-top: 5px; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="main.html" class="back">← Назад</a>
        <h2>🍉 Fruit Merge</h2>
        <div class="score">Очки: <span id="score">0</span></div>
        <div class="record">🏆 Рекорд: <span id="record">0</span></div>
        <canvas id="canvas" width="300" height="400"></canvas>
        <button class="btn" id="newGame">🔄 Новая игра</button>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script src="modals.js"></script>
    <script>
        SFX.playMusic('sweden');
        const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
        const FRUITS = ['🍒','🍓','🍊','🍋','🍏','🍇','🍈','🍑','🥝','🍉','🍍'];
        const RADII = [12,16,22,28,36,46,56,68,82,98,116];
        let fruits = [], score = 0, gameOver = false;
        let dropX = 150, nextFruit = 0;

        function start() {
            fruits = []; score = 0; gameOver = false; dropX = 150;
            nextFruit = Math.random() < 0.8 ? 0 : 1;
            document.getElementById('score').textContent = '0';
            document.getElementById('record').textContent = Highscores.get('fruitmerge');
            draw();
        }

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            dropX = Math.max(RADII[0], Math.min(300-RADII[0], e.clientX - rect.left));
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            dropX = Math.max(RADII[0], Math.min(300-RADII[0], e.touches[0].clientX - rect.left));
        });

        function spawnFruit() {
            const level = nextFruit;
            // Проверяем, не пересекается ли с существующими
            let x = dropX, y = RADII[level];
            let attempts = 0;
            while (attempts < 20) {
                let overlap = false;
                for (const f of fruits) {
                    const dx = x - f.x, dy = y - f.y;
                    if (Math.sqrt(dx*dx+dy*dy) < RADII[level] + f.r) { overlap = true; break; }
                }
                if (!overlap) break;
                x += (Math.random()-0.5)*20;
                attempts++;
            }
            fruits.push({ x, y, r: RADII[level], level, vy: 0, vx: 0, settled: false });
            nextFruit = Math.random() < 0.8 ? 0 : 1;
        }

        function update() {
            if (gameOver) return;
            
            const GRAVITY = 0.6;
            const DAMPING = 0.7;
            
            fruits.forEach(f => {
                if (f.settled) return;
                f.vy += GRAVITY;
                f.y += f.vy;
                f.x += f.vx;
                f.vx *= 0.98;
                
                // Стены — жёсткий отскок
                if (f.x - f.r < 0) { f.x = f.r; f.vx = Math.abs(f.vx)*DAMPING; }
                if (f.x + f.r > 300) { f.x = 300-f.r; f.vx = -Math.abs(f.vx)*DAMPING; }
                // Пол — оседание
                if (f.y + f.r > 400) { f.y = 400 - f.r; f.vy = 0; f.vx = 0; f.settled = true; }
            });
            
            // Коллизии — многопроходный солвер
            for (let pass = 0; pass < 5; pass++) {
                for (let i=0; i<fruits.length; i++) {
                    for (let j=i+1; j<fruits.length; j++) {
                        const fi = fruits[i], fj = fruits[j];
                        const dx = fi.x - fj.x, dy = fi.y - fj.y;
                        const dist = Math.sqrt(dx*dx+dy*dy);
                        const minDist = fi.r + fj.r;
                        
                        if (dist < minDist && dist > 0.001) {
                            const nx = dx/dist, ny = dy/dist;
                            const overlap = minDist - dist;
                            
                            if (!fi.settled && !fj.settled) {
                                fi.x += nx*overlap/2; fi.y += ny*overlap/2;
                                fj.x -= nx*overlap/2; fj.y -= ny*overlap/2;
                            } else if (!fi.settled) {
                                fi.x += nx*overlap; fi.y += ny*overlap;
                                fi.vx = 0; fi.vy = 0; fi.settled = true;
                            } else if (!fj.settled) {
                                fj.x -= nx*overlap; fj.y -= ny*overlap;
                                fj.vx = 0; fj.vy = 0; fj.settled = true;
                            }
                        }
                    }
                }
            }
            
            // Слияние
            for (let i=0; i<fruits.length; i++) {
                if (fruits[i].level >= FRUITS.length-1) continue;
                for (let j=i+1; j<fruits.length; j++) {
                    if (fruits[j].level >= FRUITS.length-1) continue;
                    if (fruits[i].level === fruits[j].level && fruits[i].settled && fruits[j].settled) {
                        const dx = fruits[i].x - fruits[j].x;
                        const dy = fruits[i].y - fruits[j].y;
                        if (Math.sqrt(dx*dx+dy*dy) < fruits[i].r*0.8) {
                            fruits[i].x = (fruits[i].x + fruits[j].x)/2;
                            fruits[i].y = (fruits[i].y + fruits[j].y)/2;
                            fruits[i].level++;
                            fruits[i].r = RADII[fruits[i].level];
                            fruits[i].settled = true;
                            fruits[i].vy = 0; fruits[i].vx = 0;
                            fruits.splice(j,1);
                            score += (fruits[i].level+1)*10;
                            document.getElementById('score').textContent = score;
                            SFX.coin();
                            j--;
                        }
                    }
                }
            }
            
            // Переполнение
            for (const f of fruits) {
                if (f.settled && f.y - f.r < -10) { gameOver = true; break; }
            }
            
            if (gameOver) {
                Highscores.save('fruitmerge', score);
                document.getElementById('record').textContent = Highscores.get('fruitmerge');
                setTimeout(() => Modal.show('💀 Переполнение!', `Очки: ${score}`).then(() => start()), 300);
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            
            // Следующий фрукт
            ctx.globalAlpha = 0.3;
            ctx.font = `${RADII[nextFruit]*1.8}px sans-serif`;
            ctx.fillText(FRUITS[nextFruit], dropX-RADII[nextFruit]*0.8, 35+RADII[nextFruit]*0.6);
            ctx.globalAlpha = 1;
            
            fruits.forEach(f => {
                ctx.font = `${f.r*1.8}px sans-serif`;
                ctx.fillText(FRUITS[f.level], f.x-f.r*0.8, f.y+f.r*0.6);
            });
        }

        canvas.addEventListener('click', () => {
            if (gameOver) return;
            spawnFruit();
            SFX.click();
        });

        setInterval(update, 20);
        document.getElementById('newGame').addEventListener('click', start);
        start();
    </script>
</body>
</html>
