<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Merge — BatonCHIK Games</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --bg: #1a1a2e; --accent: #e94560; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; user-select: none; -webkit-user-select: none; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        .record { font-size: 14px; color: #f0c040; margin-top: 5px; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="main.html" class="back">← Назад</a>
        <h2>🍉 Fruit Merge</h2>
        <div class="score">Очки: <span id="score">0</span></div>
        <div class="record">🏆 Рекорд: <span id="record">0</span></div>
        <div id="game"></div>
        <button class="btn" id="newGame">🔄 Новая игра</button>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script src="modals.js"></script>
    <script src="phaser.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        SFX.playMusic('sweden');

        const FRUITS = ['🍒','🍓','🍊','🍋','🍏','🍇','🍈','🍑','🥝','🍉','🍍'];
        const RADII = [14, 20, 28, 36, 46, 58, 72, 88, 106, 126, 148];
        const DROP_Y = 60;

        let score = 0;
        let nextIdx = 0;
        let dropX = 200;
        let gameOver = false;
        let canDrop = true;

        class FruitMerge extends Phaser.Scene {
            constructor() {
                super('FruitMerge');
            }

            create() {
                // Стены
                this.matter.world.setBounds(0, 0, 400, 600);
                this.matter.world.setGravity(0, 1.5);

                // Линия переполнения
                const g = this.add.graphics();
                g.lineStyle(2, 0xe94560, 0.8);
                for (let x = 0; x < 400; x += 10) {
                    g.lineBetween(x, DROP_Y, x + 5, DROP_Y);
                }

                // Предпросмотр
                this.previewText = this.add.text(dropX, DROP_Y, FRUITS[nextIdx], {
                    fontSize: '28px', fontFamily: 'serif'
                }).setOrigin(0.5).setAlpha(0.3);

                // Группа фруктов
                this.fruits = [];

                // Коллизия для слияния
                this.matter.world.on('collisionstart', (event) => {
                    event.pairs.forEach(pair => {
                        const a = pair.bodyA.gameObject;
                        const b = pair.bodyB.gameObject;
                        if (a && b && a.name === 'fruit' && b.name === 'fruit') {
                            this.tryMerge(a, b);
                        }
                    });
                });

                // Управление
                this.input.on('pointermove', (ptr) => {
                    if (gameOver || !canDrop) return;
                    dropX = Phaser.Math.Clamp(ptr.x, RADII[nextIdx] + 5, 400 - RADII[nextIdx] - 5);
                    this.previewText.setPosition(dropX, DROP_Y);
                });

                this.input.on('pointerdown', () => {
                    if (gameOver || !canDrop) return;
                    this.spawnFruit();
                    SFX.click();
                });
            }

            spawnFruit() {
                canDrop = false;
                const r = RADII[nextIdx];
                const fruit = this.matter.add.circle(dropX, DROP_Y, r, {
                    restitution: 0.05,
                    friction: 0.8,
                    density: 0.001,
                    label: 'fruit'
                });
                fruit.name = 'fruit';
                fruit.level = nextIdx;
                fruit.merged = false;

                const txt = this.add.text(dropX, DROP_Y, FRUITS[nextIdx], {
                    fontSize: `${r * 1.8}px`, fontFamily: 'serif'
                }).setOrigin(0.5);
                fruit.textObj = txt;

                this.fruits.push(fruit);

                nextIdx = Math.random() < 0.85 ? 0 : 1;
                this.previewText.setText(FRUITS[nextIdx]);
                this.previewText.setFontSize(RADII[nextIdx] * 1.8);

                this.time.delayedCall(200, () => { canDrop = true; });
            }

            tryMerge(a, b) {
                if (gameOver || a.merged || b.merged) return;
                if (a.level !== b.level) return;
                if (a.level >= FRUITS.length - 1) return;

                const newLevel = a.level + 1;
                const nx = (a.x + b.x) / 2;
                const ny = (a.y + b.y) / 2;
                const nr = RADII[newLevel];

                // Удаляем старые
                a.merged = true;
                b.merged = true;
                a.textObj.destroy();
                b.textObj.destroy();
                this.fruits = this.fruits.filter(f => f !== a && f !== b);
                this.matter.world.remove(a);
                this.matter.world.remove(b);

                // Новый фрукт
                const nf = this.matter.add.circle(nx, ny, nr, {
                    restitution: 0.05,
                    friction: 0.8,
                    density: 0.001,
                    label: 'fruit'
                });
                nf.name = 'fruit';
                nf.level = newLevel;
                nf.merged = false;
                nf.setVelocity(0, -4);

                const txt = this.add.text(nx, ny, FRUITS[newLevel], {
                    fontSize: `${nr * 1.8}px`, fontFamily: 'serif'
                }).setOrigin(0.5);
                nf.textObj = txt;

                this.fruits.push(nf);

                score += (newLevel + 1) * 10;
                document.getElementById('score').textContent = score;
                SFX.coin();
            }

            update() {
                if (gameOver) return;

                // Двигаем текст за фруктами
                for (const f of this.fruits) {
                    if (f.textObj) {
                        f.textObj.setPosition(f.x, f.y);
                    }
                }

                // Проверка переполнения
                for (const f of this.fruits) {
                    const speed = Math.sqrt(
                        f.velocity.x * f.velocity.x + 
                        f.velocity.y * f.velocity.y
                    );
                    if (f.y - f.circleRadius < DROP_Y - 10 && speed < 0.5) {
                        this.endGame();
                        return;
                    }
                }
            }

            endGame() {
                if (gameOver) return;
                gameOver = true;
                Highscores.save('fruitmerge', score);
                document.getElementById('record').textContent = Highscores.get('fruitmerge');
                this.time.delayedCall(300, () => {
                    Modal.show('💀 Переполнение!', `Очки: ${score}`).then(() => location.reload());
                });
            }
        }

        const config = {
            type: Phaser.AUTO,
            width: 400,
            height: 600,
            parent: 'game',
            backgroundColor: '#0a0a1a',
            physics: {
                default: 'matter',
                matter: { debug: false }
            },
            scene: FruitMerge
        };

        const game = new Phaser.Game(config);

        document.getElementById('newGame').addEventListener('click', () => location.reload());
        document.getElementById('record').textContent = Highscores.get('fruitmerge');
    </script>
</body>
</html>
