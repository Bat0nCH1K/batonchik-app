<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; --text-secondary: #b0b0b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>🧱 Brick Breaker</h2>
        <div class="score">Очки: <span id="bbScore">0</span></div>
        <canvas id="bbCanvas" width="300" height="400"></canvas>
        <p style="color:var(--text-secondary);">Перетаскивай платформу пальцем</p>
    </div>
    <script>
        const canvas = document.getElementById('bbCanvas'), ctx = canvas.getContext('2d');
        let paddle = { x:120, y:370, w:50, h:10 }, ball = { x:150, y:300, vx:3, vy:-4, r:6 };
        let bricks = [], score = 0, interval = null;
        let prevBallX, prevBallY;

        function start() {
            score = 0; document.getElementById('bbScore').textContent = '0';
            paddle.x = 120; ball = { x:150, y:300, vx:3, vy:-4, r:6 };
            bricks = [];
            for (let r = 0; r < 5; r++) for (let c = 0; c < 7; c++) bricks.push({ x:c*40+10, y:r*25+10, w:35, h:20, alive:true, color: ['#e94560','#ff9800','#f1c40f','#4caf84','#4a90d9'][r] });
            if (interval) clearInterval(interval);
            interval = setInterval(update, 16);
        }

        function update() {
            prevBallX = ball.x; prevBallY = ball.y;
            ball.x += ball.vx; ball.y += ball.vy;

            if (ball.x - ball.r <= 0 || ball.x + ball.r >= 300) ball.vx *= -1;
            if (ball.y - ball.r <= 0) ball.vy *= -1;

            if (ball.y + ball.r >= paddle.y && ball.y - ball.r <= paddle.y + paddle.h && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                ball.vy = -Math.abs(ball.vy);
                ball.y = paddle.y - ball.r;
                const hitPos = (ball.x - paddle.x) / paddle.w;
                ball.vx = (hitPos - 0.5) * 8;
            }

            if (ball.y > 400) { clearInterval(interval); alert('Очки: ' + score); start(); return; }

            let hit = false;
            bricks.forEach(b => {
                if (!b.alive || hit) return;
                // Проверяем столкновение с учётом предыдущей позиции
                if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
                    b.alive = false;
                    hit = true;
                    score += 10;
                    document.getElementById('bbScore').textContent = score;
                    
                    // Определяем сторону столкновения
                    const overlapLeft = (ball.x + ball.r) - b.x;
                    const overlapRight = (b.x + b.w) - (ball.x - ball.r);
                    const overlapTop = (ball.y + ball.r) - b.y;
                    const overlapBottom = (b.y + b.h) - (ball.y - ball.r);
                    
                    const minOverlapX = Math.min(overlapLeft, overlapRight);
                    const minOverlapY = Math.min(overlapTop, overlapBottom);
                    
                    if (minOverlapX < minOverlapY) {
                        ball.vx *= -1;
                    } else {
                        ball.vy *= -1;
                    }
                    
                    // Выталкиваем шарик из кирпича
                    if (minOverlapX < minOverlapY) {
                        ball.x = overlapLeft < overlapRight ? b.x - ball.r : b.x + b.w + ball.r;
                    } else {
                        ball.y = overlapTop < overlapBottom ? b.y - ball.r : b.y + b.h + ball.r;
                    }
                }
            });

            if (bricks.every(b => !b.alive)) { clearInterval(interval); alert('🎉 Победа! Очки: ' + score); start(); return; }
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#fff'; ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            bricks.forEach(b => { if (!b.alive) return; ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, b.w, b.h); });
        }

        canvas.addEventListener('touchmove', e => { e.preventDefault(); const rect = canvas.getBoundingClientRect(); paddle.x = Math.max(0, Math.min(300 - paddle.w, e.touches[0].clientX - rect.left - paddle.w/2)); });
        canvas.addEventListener('mousemove', e => { const rect = canvas.getBoundingClientRect(); paddle.x = Math.max(0, Math.min(300 - paddle.w, e.clientX - rect.left - paddle.w/2)); });

        start();
    </script>
</body>
</html>
