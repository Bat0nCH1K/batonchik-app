<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brick Breaker — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; --text-secondary: #b0b0b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>🧱 Brick Breaker</h2>
        <div class="score">Очки: <span id="bbScore">0</span></div>
        <canvas id="bbCanvas" width="300" height="400"></canvas>
        <p style="color:var(--text-secondary);">Перетаскивай платформу пальцем</p>
        <button class="btn" id="startBtn">▶ Старт</button>
    </div>
    <script>
        const canvas = document.getElementById('bbCanvas'), ctx = canvas.getContext('2d');
        let paddle = { x:120, y:370, w:50, h:10 }, ball = { x:150, y:350, vx:0, vy:0, r:6 };
        let bricks = [], score = 0, interval = null, running = false;

        function init() {
            score = 0; document.getElementById('bbScore').textContent = '0';
            paddle.x = 120;
            // Гарантированно летит вверх (угол 120°–150° от оси X вправо = 30°–60° влево-вверх)
            const baseAngle = Math.PI / 2; // 90° — строго вверх
            const spread = Math.PI / 6; // ±30°
            const angle = baseAngle + (Math.random() - 0.5) * spread;
            const speed = 7;
            ball = {
                x: paddle.x + paddle.w/2,
                y: paddle.y - 15,
                vx: Math.cos(angle) * speed,
                vy: -Math.sin(angle) * speed,
                r: 6
            };
            // Двойная проверка: vy должен быть отрицательным
            if (ball.vy >= 0) ball.vy = -speed;
            bricks = [];
            for (let r = 0; r < 5; r++) for (let c = 0; c < 7; c++) bricks.push({ x:c*40+10, y:r*25+10, w:35, h:20, alive:true, color: ['#e94560','#ff9800','#f1c40f','#4caf84','#4a90d9'][r] });
            running = false;
            document.getElementById('startBtn').style.display = 'block';
            draw();
        }

        function start() {
            if (running) return;
            running = true;
            document.getElementById('startBtn').style.display = 'none';
            if (interval) clearInterval(interval);
            interval = setInterval(update, 16);
        }

        function update() {
            if (!running) return;
            ball.x += ball.vx * 0.016 * 60;
            ball.y += ball.vy * 0.016 * 60;

            if (ball.x - ball.r <= 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx); }
            if (ball.x + ball.r >= 300) { ball.x = 300 - ball.r; ball.vx = -Math.abs(ball.vx); }
            if (ball.y - ball.r <= 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy); }
            
            if (ball.vy > 0 && ball.y + ball.r >= paddle.y && ball.y - ball.r <= paddle.y + paddle.h && ball.x + ball.r > paddle.x && ball.x - ball.r < paddle.x + paddle.w) {
                ball.y = paddle.y - ball.r;
                const hitPos = (ball.x - paddle.x) / paddle.w;
                const angle = (hitPos - 0.5) * 1.2;
                const speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
                ball.vx = Math.sin(angle) * speed;
                ball.vy = -Math.abs(Math.cos(angle) * speed);
                if (Math.abs(ball.vy) < 4) ball.vy = -5;
            }

            if (ball.y > 420) { clearInterval(interval); running = false; alert('Очки: ' + score); init(); return; }

            for (const b of bricks) {
                if (!b.alive) continue;
                if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
                    b.alive = false; score += 10; document.getElementById('bbScore').textContent = score;
                    const cx = Math.max(b.x, Math.min(ball.x, b.x + b.w)), cy = Math.max(b.y, Math.min(ball.y, b.y + b.h));
                    const dx = ball.x - cx, dy = ball.y - cy;
                    if (Math.abs(dx) > Math.abs(dy)) { ball.vx = ball.x < cx ? -Math.abs(ball.vx) : Math.abs(ball.vx); ball.x += ball.vx > 0 ? 3 : -3; }
                    else { ball.vy = ball.y < cy ? -Math.abs(ball.vy) : Math.abs(ball.vy); ball.y += ball.vy > 0 ? 3 : -3; }
                    break;
                }
            }

            if (bricks.every(b => !b.alive)) { clearInterval(interval); running = false; alert('🎉 Победа! Очки: ' + score); init(); return; }
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = '#fff'; ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
            bricks.forEach(b => { if (!b.alive) return; ctx.fillStyle = b.color; ctx.fillRect(b.x, b.y, b.w, b.h); });
        }

        document.getElementById('startBtn').addEventListener('click', start);
        canvas.addEventListener('touchmove', e => { e.preventDefault(); const rect = canvas.getBoundingClientRect(); paddle.x = Math.max(0, Math.min(300 - paddle.w, e.touches[0].clientX - rect.left - paddle.w/2)); });
        canvas.addEventListener('mousemove', e => { const rect = canvas.getBoundingClientRect(); paddle.x = Math.max(0, Math.min(300 - paddle.w, e.clientX - rect.left - paddle.w/2)); });

        init();
    </script>
</body>
</html>
