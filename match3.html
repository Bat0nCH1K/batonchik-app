<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match-3 — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>💎 Match-3</h2>
        <div class="score">Очки: <span id="m3Score">0</span></div>
        <canvas id="m3Canvas" width="320" height="320"></canvas>
    </div>
    <script src="sfx.js"></script>
    <script>
        const canvas = document.getElementById('m3Canvas'), ctx = canvas.getContext('2d');
        const ROWS = 8, COLS = 8, CELL = 40;
        const gems = ['🔴','🔵','🟢','🟡','🟣','🟠'];
        let board = [], selected = null, score = 0, processing = false;

        function start() {
            score = 0; document.getElementById('m3Score').textContent = '0';
            board = Array(ROWS).fill().map(() => Array(COLS).fill().map(() => Math.floor(Math.random()*6)));
            while (findMatches().length) removeMatches(true);
            if (!hasMoves()) start();
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
                if (board[r][c] === -1) continue;
                ctx.font = '30px sans-serif';
                ctx.fillText(gems[board[r][c]], c*CELL+5, r*CELL+33);
                if (selected && selected.r===r && selected.c===c) {
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                    ctx.strokeRect(c*CELL+2, r*CELL+2, CELL-4, CELL-4);
                }
            }
        }

        function findMatches() {
            const matches = [];
            for (let r=0; r<ROWS; r++) for (let c=0; c<COLS-2; c++) if (board[r][c]!==-1&&board[r][c]===board[r][c+1]&&board[r][c]===board[r][c+2]) matches.push({r,c},{r,c:c+1},{r,c:c+2});
            for (let c=0; c<COLS; c++) for (let r=0; r<ROWS-2; r++) if (board[r][c]!==-1&&board[r][c]===board[r+1][c]&&board[r][c]===board[r+2][c]) matches.push({r,c},{r:r+1,c},{r:r+2,c});
            return [...new Map(matches.map(m=>`${m.r},${m.c}`)).values()];
        }

        function removeMatches(silent) {
            const m = findMatches();
            if (!m.length) return false;
            m.forEach(({r,c}) => board[r][c] = -1);
            score += m.length * 10; document.getElementById('m3Score').textContent = score;
            if (!silent) SFX.match();
            for (let c=0; c<COLS; c++) {
                let write = ROWS-1;
                for (let r=ROWS-1; r>=0; r--) if (board[r][c]!==-1) board[write--][c] = board[r][c];
                while (write>=0) board[write--][c] = Math.floor(Math.random()*6);
            }
            draw();
            return true;
        }

        function hasMoves() {
            for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
                if (c<COLS-1) { swap(r,c,r,c+1); if (findMatches().length) { swap(r,c,r,c+1); return true; } swap(r,c,r,c+1); }
                if (r<ROWS-1) { swap(r,c,r+1,c); if (findMatches().length) { swap(r,c,r+1,c); return true; } swap(r,c,r+1,c); }
            }
            return false;
        }

        function swap(r1,c1,r2,c2) { [board[r1][c1],board[r2][c2]] = [board[r2][c2],board[r1][c1]]; }

        async function processMatches() {
            processing = true;
            while (removeMatches(false)) { await new Promise(r => setTimeout(r, 300)); draw(); }
            if (!hasMoves()) { start(); }
            processing = false;
        }

        canvas.addEventListener('click', async (e) => {
            if (processing) return;
            const rect = canvas.getBoundingClientRect();
            const c = Math.floor((e.clientX-rect.left)/CELL), r = Math.floor((e.clientY-rect.top)/CELL);
            if (r<0||r>=ROWS||c<0||c>=COLS) return;
            if (!selected) { selected = {r,c}; draw(); return; }
            if (selected.r===r && selected.c===c) { selected = null; draw(); return; }
            if (Math.abs(selected.r-r)+Math.abs(selected.c-c) === 1) {
                swap(selected.r,selected.c,r,c); selected = null; draw();
                if (!findMatches().length) { await new Promise(r => setTimeout(r, 200)); swap(selected?.r??r,selected?.c??c,r,c); selected = null; draw(); }
                else processMatches();
            } else { selected = {r,c}; draw(); }
        });

        start();
    </script>
</body>
</html>
