<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match-3 — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>💎 Match-3</h2>
        <div class="score">Очки: <span id="m3Score">0</span></div>
        <canvas id="m3Canvas" width="320" height="320"></canvas>
        <p style="color:var(--text-secondary);font-size:12px;">Меняй соседние камни местами, собирай 3+ в ряд</p>
    </div>
    <script>
        const canvas = document.getElementById('m3Canvas'), ctx = canvas.getContext('2d');
        const ROWS = 8, COLS = 8, CELL = 40;
        const colors = ['#e94560','#4a90d9','#4caf84','#f0c040','#ff9800','#8e44ad'];
        let board = [], selected = null, score = 0, processing = false;

        function start() {
            score = 0; document.getElementById('m3Score').textContent = '0';
            board = Array(ROWS).fill().map(() => Array(COLS).fill().map(() => Math.floor(Math.random()*6)));
            while (findMatches().length || !hasMoves()) {
                for (const {r,c} of findMatches()) board[r][c] = Math.floor(Math.random()*6);
            }
            draw();
        }

        function hasMoves() {
            for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
                if (c<COLS-1) { [board[r][c],board[r][c+1]]=[board[r][c+1],board[r][c]]; if (findMatches().length) { [board[r][c],board[r][c+1]]=[board[r][c+1],board[r][c]]; return true; } [board[r][c],board[r][c+1]]=[board[r][c+1],board[r][c]]; }
                if (r<ROWS-1) { [board[r][c],board[r+1][c]]=[board[r+1][c],board[r][c]]; if (findMatches().length) { [board[r][c],board[r+1][c]]=[board[r+1][c],board[r][c]]; return true; } [board[r][c],board[r+1][c]]=[board[r+1][c],board[r][c]]; }
            }
            return false;
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
                ctx.fillStyle = colors[board[r][c]];
                ctx.beginPath(); ctx.roundRect(c*CELL+2, r*CELL+2, CELL-4, CELL-4, 8); ctx.fill();
                if (selected && selected.r===r && selected.c===c) {
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();
                }
            }
        }

        function findMatches() {
            const matches = [];
            for (let r=0; r<ROWS; r++) for (let c=0; c<COLS-2; c++) if (board[r][c]===board[r][c+1]&&board[r][c]===board[r][c+2]) matches.push({r,c},{r,c:c+1},{r,c:c+2});
            for (let c=0; c<COLS; c++) for (let r=0; r<ROWS-2; r++) if (board[r][c]===board[r+1][c]&&board[r][c]===board[r+2][c]) matches.push({r,c},{r:r+1,c},{r:r+2,c});
            return [...new Map(matches.map(m=>`${m.r},${m.c}`)).values()];
        }

        function removeMatches() {
            const matches = findMatches();
            if (!matches.length) return false;
            matches.forEach(({r,c}) => board[r][c] = -1);
            score += matches.length * 10;
            document.getElementById('m3Score').textContent = score;
            for (let c=0; c<COLS; c++) {
                let write = ROWS-1;
                for (let r=ROWS-1; r>=0; r--) if (board[r][c]!==-1) board[write--][c] = board[r][c];
                while (write>=0) board[write--][c] = Math.floor(Math.random()*6);
            }
            draw();
            return true;
        }

        async function processMatches() {
            processing = true;
            while (removeMatches()) { await new Promise(r => setTimeout(r, 300)); draw(); }
            if (!hasMoves()) { alert('Нет ходов! Перемешиваю...'); start(); }
            processing = false;
        }

        canvas.addEventListener('click', async (e) => {
            if (processing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left, y = e.clientY - rect.top;
            const c = Math.floor(x/CELL), r = Math.floor(y/CELL);
            if (r<0||r>=ROWS||c<0||c>=COLS) return;
            if (!selected) { selected = {r,c}; draw(); return; }
            if (selected.r===r && selected.c===c) { selected = null; draw(); return; }
            const dr = Math.abs(selected.r-r), dc = Math.abs(selected.c-c);
            if (dr+dc === 1) {
                [board[selected.r][selected.c], board[r][c]] = [board[r][c], board[selected.r][selected.c]];
                selected = null; draw();
                if (!findMatches().length) {
                    await new Promise(r => setTimeout(r, 200));
                    [board[selected?.r??r][selected?.c??c], board[r][c]] = [board[r][c], board[selected?.r??r][selected?.c??c]];
                    selected = null; draw();
                } else { processMatches(); }
            } else { selected = {r,c}; draw(); }
        });

        start();
    </script>
</body>
</html>
