<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match-3 — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 20px; margin: 10px 0; }
        canvas { border: 2px solid var(--accent); border-radius: 12px; background: #0a0a1a; display: block; margin: 10px auto; touch-action: none; }
        #debug-log {
            position: fixed; bottom: 0; left: 0; width: 100%; max-height: 30%;
            overflow-y: auto; background: rgba(0,0,0,0.85); color: #0f0;
            font-size: 10px; padding: 8px; z-index: 9999; display: none; text-align: left;
        }
    </style>
</head>
<body>
    <div id="debug-log"></div>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>💎 Match-3 v2.1</h2>
        <div class="score">Очки: <span id="m3Score">0</span></div>
        <canvas id="m3Canvas" width="320" height="320"></canvas>
    </div>
    <script src="sfx.js"></script>
    <script>
        // Отладчик на экране
        function debug(msg) {
            const el = document.getElementById('debug-log');
            if (!el) return;
            el.style.display = 'block';
            el.innerHTML += msg + '<br>';
            el.scrollTop = el.scrollHeight;
        }
        window.onerror = function(msg, url, line) {
            debug('❌ ' + msg + ' (строка ' + line + ')');
        };
        debug('Match-3 v2.1 загружен!');

        const canvas = document.getElementById('m3Canvas'), ctx = canvas.getContext('2d');
        const ROWS = 8, COLS = 8, CELL = 40;
        const colors = ['#e94560','#4a90d9','#4caf84','#f0c040','#ff9800','#8e44ad'];
        let board = [], selected = null, score = 0, processing = false;

        function start() {
            score = 0; document.getElementById('m3Score').textContent = '0';
            board = Array(ROWS).fill().map(() => Array(COLS).fill().map(() => Math.floor(Math.random()*6)));
            let matches = getMatches();
            while (matches.length > 0) {
                matches.forEach(({r,c}) => board[r][c] = Math.floor(Math.random()*6));
                matches = getMatches();
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
                if (board[r][c] === -1) continue;
                ctx.fillStyle = colors[board[r][c]];
                ctx.beginPath();
                ctx.arc(c*CELL+CELL/2, r*CELL+CELL/2, CELL/2-4, 0, Math.PI*2);
                ctx.fill();
                if (selected && selected.r===r && selected.c===c) {
                    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(c*CELL+CELL/2, r*CELL+CELL/2, CELL/2-1, 0, Math.PI*2);
                    ctx.stroke();
                }
            }
        }

        function getMatches() {
            const matches = [];
            for (let r=0; r<ROWS; r++) for (let c=0; c<COLS-2; c++) if (board[r][c]!==-1 && board[r][c]===board[r][c+1] && board[r][c]===board[r][c+2]) matches.push({r,c},{r,c:c+1},{r,c:c+2});
            for (let c=0; c<COLS; c++) for (let r=0; r<ROWS-2; r++) if (board[r][c]!==-1 && board[r][c]===board[r+1][c] && board[r][c]===board[r+2][c]) matches.push({r,c},{r:r+1,c},{r:r+2,c});
            return [...new Map(matches.map(m => `${m.r},${m.c}`)).values()];
        }

        function gravity() {
            for (let c=0; c<COLS; c++) {
                let write = ROWS-1;
                for (let r=ROWS-1; r>=0; r--) {
                    if (board[r][c] !== -1) {
                        board[write][c] = board[r][c];
                        if (write !== r) board[r][c] = -1;
                        write--;
                    }
                }
                while (write >= 0) { board[write][c] = Math.floor(Math.random()*6); write--; }
            }
        }

        function processMatches() {
            processing = true;
            let matches = getMatches();
            debug('Найдено матчей: ' + matches.length);
            
            function step() {
                if (matches.length === 0) {
                    debug('Готово!');
                    processing = false;
                    draw();
                    return;
                }
                
                score += matches.length * 10;
                document.getElementById('m3Score').textContent = score;
                SFX.match();
                debug('Удаляю ' + matches.length + ' матчей...');
                
                matches.forEach(({r,c}) => board[r][c] = -1);
                draw();
                
                setTimeout(() => {
                    debug('Гравитация...');
                    gravity();
                    draw();
                    setTimeout(() => {
                        matches = getMatches();
                        debug('Новых матчей: ' + matches.length);
                        step();
                    }, 200);
                }, 200);
            }
            
            step();
        }

        function swap(r1,c1,r2,c2) {
            [board[r1][c1], board[r2][c2]] = [board[r2][c2], board[r1][c1]];
        }

        canvas.addEventListener('click', (e) => {
            if (processing) return;
            const rect = canvas.getBoundingClientRect();
            const c = Math.floor((e.clientX-rect.left)/CELL);
            const r = Math.floor((e.clientY-rect.top)/CELL);
            if (r<0||r>=ROWS||c<0||c>=COLS) return;
            
            if (!selected) { selected = {r,c}; draw(); return; }
            if (selected.r===r && selected.c===c) { selected = null; draw(); return; }
            if (Math.abs(selected.r-r) + Math.abs(selected.c-c) !== 1) { selected = {r,c}; draw(); return; }
            
            swap(selected.r, selected.c, r, c);
            selected = null;
            draw();
            
            if (getMatches().length > 0) {
                processMatches();
            } else {
                setTimeout(() => {
                    swap(selected?.r??r, selected?.c??c, r, c);
                    selected = null;
                    draw();
                }, 300);
            }
        });

        start();
    </script>
</body>
</html>
