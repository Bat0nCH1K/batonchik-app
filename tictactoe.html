<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-нолики — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; --text-secondary: #b0b0b0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 240px; margin: 16px auto; }
        .cell { width: 76px; height: 76px; background: var(--card); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; cursor: pointer; }
        .cell:active { background: var(--accent); }
        .feedback { margin-top: 14px; font-size: 17px; font-weight: bold; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>❌ Крестики-нолики</h2>
        <p style="color:var(--text-secondary);margin-bottom:10px;">Ты: ❌ | Нейросеть: ⭕</p>
        <div class="board" id="tttBoard"></div>
        <p class="feedback" id="tttFeedback">Твой ход</p>
        <button class="btn" id="resetTTT">🔄 Новая игра</button>
    </div>
    <script>
        let board = [], gameOver = false;

        function start() {
            board = Array(9).fill('');
            gameOver = false;
            document.getElementById('tttFeedback').textContent = 'Твой ход';
            draw();
        }

        function draw() {
            document.getElementById('tttBoard').innerHTML = board.map((v, i) => `<div class="cell" onclick="move(${i})">${v}</div>`).join('');
        }

        function checkWin(p, b) {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return wins.some(w => w.every(i => (b || board)[i] === p));
        }

        function findFork(player) {
            const opponent = player === '❌' ? '⭕' : '❌';
            for (let i = 0; i < 9; i++) {
                if (board[i]) continue;
                const b = [...board];
                b[i] = player;
                let winCount = 0;
                const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (const w of wins) {
                    const vals = w.map(j => b[j]);
                    if (vals.filter(v => v === player).length === 2 && vals.includes('')) winCount++;
                }
                if (winCount >= 2) return i;
            }
            return -1;
        }

        function aiMove() {
            const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            
            // Победный ход
            for (const w of wins) {
                const vals = w.map(i => board[i]);
                if (vals.filter(v => v === '⭕').length === 2 && vals.includes('')) return w[vals.indexOf('')];
            }
            // Блокировка
            for (const w of wins) {
                const vals = w.map(i => board[i]);
                if (vals.filter(v => v === '❌').length === 2 && vals.includes('')) return w[vals.indexOf('')];
            }
            // Блокировка вилки противника
            const forkBlock = findFork('❌');
            if (forkBlock !== -1) return forkBlock;
            // Создание своей вилки
            const forkCreate = findFork('⭕');
            if (forkCreate !== -1) return forkCreate;
            // Центр
            if (!board[4]) return 4;
            // Углы
            const corners = [0,2,6,8].filter(i => !board[i]);
            if (corners.length) return corners[Math.floor(Math.random()*corners.length)];
            // Любая
            const empty = board.map((v,i) => v ? -1 : i).filter(v => v >= 0);
            return empty[Math.floor(Math.random()*empty.length)];
        }

        function move(i) {
            if (board[i] || gameOver) return;
            board[i] = '❌'; draw();
            if (checkWin('❌')) { document.getElementById('tttFeedback').textContent = 'Ты победил!'; gameOver = true; return; }
            if (board.every(v => v)) { document.getElementById('tttFeedback').textContent = 'Ничья!'; gameOver = true; return; }
            
            const ai = aiMove();
            board[ai] = '⭕';
            draw();
            
            if (checkWin('⭕')) { document.getElementById('tttFeedback').textContent = 'Нейросеть победила!'; gameOver = true; return; }
            if (board.every(v => v)) { document.getElementById('tttFeedback').textContent = 'Ничья!'; gameOver = true; return; }
            document.getElementById('tttFeedback').textContent = 'Твой ход';
        }

        document.getElementById('resetTTT').addEventListener('click', start);
        start();
    </script>
</body>
</html>
