<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-нолики — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; --text-secondary: #b0b0b0; --gold: #f0c040; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 240px; margin: 16px auto; }
        .cell { width: 76px; height: 76px; background: var(--card); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: bold; cursor: pointer; }
        .cell:active { background: var(--accent); }
        .feedback { margin-top: 14px; font-size: 17px; font-weight: bold; }
        .btn { padding: 12px 20px; border-radius: 12px; font-size: 14px; background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .record { font-size: 14px; color: #f0c040; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>❌ Крестики-нолики</h2>
        <p style="color:var(--text-secondary);margin-bottom:10px;">Ты: ❌ | ИИ: ⭕</p>
        <div class="board" id="tttBoard"></div>
        <p class="feedback" id="tttFeedback">Твой ход</p>
        <div class="record">🏆 Побед: <span id="tttWins">0</span></div>
        <button class="btn" id="resetTTT">🔄 Новая игра</button>
    </div>
    <script src="sfx.js"></script>
    <script src="highscores.js"></script>
    <script src="modals.js"></script>
    <script>
        SFX.playMusic('papers');
        let board, gameOver, wins = parseInt(localStorage.getItem('ttt_wins') || '0');
        const HU = '❌', AI = '⭕';

        document.getElementById('tttWins').textContent = wins;

        function start() {
            board = Array(9).fill(''); gameOver = false;
            document.getElementById('tttFeedback').textContent = 'Твой ход';
            draw();
        }

        function draw() { document.getElementById('tttBoard').innerHTML = board.map((v, i) => `<div class="cell" onclick="move(${i})">${v}</div>`).join(''); }

        function win(p, b) { const w = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; return w.some(w => w.every(i => (b||board)[i] === p)); }

        function minimax(b, depth, isMax) {
            if (win(AI, b)) return 10 - depth;
            if (win(HU, b)) return depth - 10;
            if (b.every(v => v !== '')) return 0;
            if (isMax) { let best = -Infinity; for (let i=0; i<9; i++) { if (b[i]!=='') continue; b[i]=AI; best=Math.max(best,minimax(b,depth+1,false)); b[i]=''; } return best; }
            else { let best = Infinity; for (let i=0; i<9; i++) { if (b[i]!=='') continue; b[i]=HU; best=Math.min(best,minimax(b,depth+1,true)); b[i]=''; } return best; }
        }

        function bestMove() { let bestScore=-Infinity, move=0; for (let i=0; i<9; i++) { if (board[i]!=='') continue; board[i]=AI; const score=minimax(board,0,false); board[i]=''; if (score>bestScore) { bestScore=score; move=i; } } return move; }

        function move(i) {
            if (board[i]!=='' || gameOver) return;
            board[i]=HU; draw(); SFX.click();
            if (win(HU)) {
                document.getElementById('tttFeedback').textContent = 'Ты победил! 🎉';
                wins++; localStorage.setItem('ttt_wins', wins);
                document.getElementById('tttWins').textContent = wins;
                Highscores.save('tictactoe', wins);
                localStorage.setItem('earned_TICKET-LEGEND', '1');
                gameOver=true; SFX.win(); return;
            }
            if (board.every(v=>v!=='')) { document.getElementById('tttFeedback').textContent='Ничья!'; gameOver=true; return; }
            board[bestMove()]=AI; draw();
            if (win(AI)) { document.getElementById('tttFeedback').textContent='ИИ победил!'; gameOver=true; SFX.lose(); return; }
            if (board.every(v=>v!=='')) { document.getElementById('tttFeedback').textContent='Ничья!'; gameOver=true; }
        }

        document.getElementById('resetTTT').addEventListener('click', start);
        start();
    </script>
</body>
</html>
