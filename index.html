<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест кнопок</title>
    <style>
        body { background: #1a1a2e; color: white; text-align: center; padding: 40px; font-family: sans-serif; }
        button { padding: 20px; font-size: 20px; margin: 10px; border-radius: 12px; border: none; cursor: pointer; background: #e94560; color: white; display: block; width: 200px; margin: 10px auto; }
    </style>
</head>
<body>
    <h1>Тест кнопок</h1>
    <button id="btn1">Кнопка 1</button>
    <button id="btn2">Кнопка 2</button>
    <button id="btn3">Кнопка 3</button>

    <script>
        document.getElementById('btn1').addEventListener('click', function() {
            alert('Кнопка 1 работает!');
        });
        document.getElementById('btn2').addEventListener('click', function() {
            alert('Кнопка 2 работает!');
        });
        document.getElementById('btn3').addEventListener('click', function() {
            alert('Кнопка 3 работает!');
        });
    </script>
</body>
</html>
