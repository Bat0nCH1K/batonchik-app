<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кликер — BatonCHIK Games</title>
    <style>
        :root { --bg: #1a1a2e; --card: #16213e; --accent: #e94560; --text: #fff; --gold: #f0c040; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        h2 { font-size: 20px; margin-bottom: 16px; }
        .back { display: inline-block; color: var(--accent); text-decoration: none; font-size: 14px; margin-bottom: 10px; }
        .score { font-size: 48px; font-weight: bold; color: var(--accent); margin: 16px 0; }
        .click-btn {
            width: 130px; height: 130px; border-radius: 50%; border: 4px solid var(--accent);
            background: var(--card); color: white; font-size: 28px; font-weight: bold;
            cursor: pointer; box-shadow: 0 6px 20px rgba(233,69,96,0.4);
            transition: transform 0.1s; margin: 20px auto; display: block;
        }
        .click-btn:active { transform: scale(0.9); background: var(--accent); }
        .upgrade-btn { display: block; width: 100%; max-width: 300px; margin: 10px auto; padding: 14px; border: 2px solid var(--accent); border-radius: 12px; background: var(--card); color: var(--text); font-size: 14px; cursor: pointer; font-weight: bold; }
        .upgrade-btn:disabled { opacity: 0.3; border-color: #555; }
        .secret { margin-top: 10px; font-size: 14px; color: var(--gold); font-weight: bold; display: none; }
        .secret.show { display: block; }
        .reset-btn { display: block; width: 100%; max-width: 300px; margin: 10px auto; padding: 10px; background: none; border: 1px solid #555; color: #999; font-size: 12px; cursor: pointer; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back">← Назад</a>
        <h2>🔴 Кликер</h2>
        <div class="score" id="score">0</div>
        <p>Очков: <span id="clicks">0</span> | За клик: <span id="perClick">1</span> | Авто: <span id="autoClicker">0</span>/сек</p>
        <button class="click-btn" id="clickBtn">ЖМИ</button>
        <button class="upgrade-btn" id="up1" disabled>+1 к клику (10)</button>
        <button class="upgrade-btn" id="up2" disabled>Автокликер +1/сек (50)</button>
        <div class="secret" id="secretCode"></div>
        <button class="reset-btn" id="resetBtn">🔄 Сбросить прогресс</button>
    </div>
    <script src="sfx.js"></script>
    <script>
        const VERSION = 3;
        let data = JSON.parse(localStorage.getItem('clicker_save') || '{}');
        if (data.version !== VERSION) { data = {}; }

        let score = data.score || 0;
        let perClick = data.perClick || 1;
        let clickCost = data.clickCost || 10;
        let autoClicker = data.autoClicker || 0;
        let autoCost = data.autoCost || 50;
        let codeShown = data.codeShown || false;

        function save() { localStorage.setItem('clicker_save', JSON.stringify({ version: VERSION, score, perClick, clickCost, autoClicker, autoCost, codeShown })); }
        const ceil = (n) => Math.ceil(n);

        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('clicks').textContent = score;
            document.getElementById('perClick').textContent = perClick;
            document.getElementById('autoClicker').textContent = autoClicker;
            document.getElementById('up1').disabled = score < clickCost;
            document.getElementById('up1').textContent = `+1 к клику (${clickCost})`;
            document.getElementById('up2').disabled = score < autoCost;
            document.getElementById('up2').textContent = `Автокликер +1/сек (${autoCost})`;
            if (score >= 1000000 && !codeShown) {
                codeShown = true;
                document.getElementById('secretCode').innerHTML = `🏆 Титул получен: Клик-мастер!`;
                document.getElementById('secretCode').classList.add('show');
                localStorage.setItem('earned_CLICK-MASTER', '1');
                SFX.win();
            }
            save();
        }

        document.getElementById('clickBtn').addEventListener('click', () => { SFX.click(); score += perClick; updateUI(); });
        document.getElementById('up1').addEventListener('click', () => {
            if (score >= clickCost) { score -= clickCost; perClick += 1; clickCost = ceil(clickCost * 1.05); SFX.coin(); updateUI(); }
        });
        document.getElementById('up2').addEventListener('click', () => {
            if (score >= autoCost) { score -= autoCost; autoClicker += 1; autoCost = ceil(autoCost * 1.05); SFX.coin(); updateUI(); }
        });
        document.getElementById('resetBtn').addEventListener('click', () => {
            if (confirm('Сбросить весь прогресс?')) { localStorage.removeItem('clicker_save'); location.reload(); }
        });
        setInterval(() => { if (autoClicker > 0) { score += autoClicker; updateUI(); } }, 1000);
        updateUI();
    </script>
</body>
</html>
